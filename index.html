<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMJIN Hub - 기성 관리 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; display: inline-block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ==========================================
    // 웹훅 주소 (n8n) — 등록·수정 전송 전용
    // ==========================================
    const WEBHOOK_LOAD_URL = 'https://158.179.174.86.sslip.io/webhook-test/795acae9-62b5-4ba0-b0ce-a80f9e3a5d88';
    const WEBHOOK_EDIT_URL = 'https://158.179.174.86.sslip.io/webhook-test/0d46d84b-8a63-4c11-9536-bb50c5e34a5f';
    const WEBHOOK_PWD_URL      = 'https://158.179.174.86.sslip.io/webhook-test/ae2b0e5c-37ec-42f9-a5b3-4bd7469872c4';
    const WEBHOOK_NEW_SITE_URL = 'https://158.179.174.86.sslip.io/webhook-test/c40cc374-0ff2-4d2f-b390-ea811ecfac71';

    // ==========================================
    // Google Sheets 설정
    // ==========================================
    const SHEET_ID   = '1K3X7vKsm21Bt9kIro8JpYcZmBU03nT7l5ipgsU6JAw4';

    // 기성리스트 시트
    const SHEET_NAME = '기성리스트';
    const SHEETS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1`;
    const COL_NAMES  = ['이름','직책','이메일','현장명','연도','월','회차','공종','계약금액','전회기성','금회기성','누계기성','잔여금액','기성률','업데이트','고유코드'];

    // DB정보 시트 (로그인 + 현장 목록)
    const DB_SHEET_NAME = 'DB정보';
    const DB_SHEETS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(DB_SHEET_NAME)}&headers=1`;
    const DB_COL_NAMES  = ['ID', '비밀번호', '현장명', '회사', '계약금액'];

    // ==========================================
    // 유틸리티 함수
    // ==========================================

    const parseAmount = (val) => {
      if (val === null || val === undefined || val === '') return 0;
      if (typeof val === 'number') return Math.floor(val);
      return parseInt(String(val).replace(/[^0-9]/g, ''), 10) || 0;
    };

    const parseN8nResponse = (text) => {
      if (!text || !text.trim()) return [];
      let parsed;
      try { parsed = JSON.parse(text); } catch (e) { return []; }
      if (Array.isArray(parsed) && parsed.length > 0 && parsed[0] && typeof parsed[0].json === 'object') {
        return parsed.map(item => item.json);
      }
      if (Array.isArray(parsed)) return parsed;
      if (Array.isArray(parsed?.data))  return parsed.data;
      if (Array.isArray(parsed?.rows))  return parsed.rows;
      if (Array.isArray(parsed?.items)) return parsed.items;
      if (parsed && typeof parsed === 'object') return [parsed];
      return [];
    };

    // colNames 파라미터 추가 — 기성리스트·DB정보 양쪽 재사용
    const parseGSheetResponse = (text, colNames = COL_NAMES) => {
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
      if (!match) throw new Error('Google Sheets 응답 형식을 파싱하지 못했습니다. 시트 공유 설정을 확인하세요.');
      const json = JSON.parse(match[1]);
      if (json.status !== 'ok') {
        const msg = json.errors?.[0]?.detailed_message || json.errors?.[0]?.message || '알 수 없는 오류';
        throw new Error(`Google Sheets 오류: ${msg}`);
      }
      const cols = json.table?.cols || [];
      const rows = json.table?.rows || [];
      return rows
        .filter(row => row.c && row.c.some(cell => cell?.v != null))
        .map((row, idx) => {
          const obj = { _rowIndex: idx + 2 };
          cols.forEach((col, ci) => {
            const key = colNames[ci] || col.label || col.id;
            obj[key] = row.c?.[ci]?.v ?? '';
          });
          return obj;
        });
    };

    const fetchWithTimeout = async (url, options, timeoutMs = 15000) => {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timer);
        return res;
      } catch (e) {
        clearTimeout(timer);
        if (e.name === 'AbortError') throw new Error('요청 시간 초과 (15초). 네트워크 상태를 확인하세요.');
        throw e;
      }
    };

    const numberToKorean = (num) => {
      if (!num || isNaN(num)) return '';
      const units = ['', '만', '억', '조'];
      let res = '';
      let n = Math.floor(num);
      for (let i = 0; n > 0 && i < units.length; i++) {
        let chunk = n % 10000;
        if (chunk > 0) res = chunk.toLocaleString() + units[i] + ' ' + res;
        n = Math.floor(n / 10000);
      }
      return res.trim() + ' 원';
    };

    const ProgressCircle = ({ percent, size = 40 }) => {
      const radius = size * 0.4;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (percent / 100) * circumference;
      return (
        <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
          <svg width={size} height={size}>
            <circle className="text-gray-200" strokeWidth="4" stroke="currentColor" fill="transparent" r={radius} cx={size/2} cy={size/2} />
            <circle className="text-blue-600 progress-ring__circle" strokeWidth="4" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" stroke="currentColor" fill="transparent" r={radius} cx={size/2} cy={size/2} />
          </svg>
          <span className="absolute text-[9px] font-bold">{Math.round(percent)}%</span>
        </div>
      );
    };

    // ==========================================
    // 엑셀 다운로드 함수
    // ==========================================

    const exportMonthlyToExcel = (statements, year, month, siteList) => {
      if (typeof XLSX === 'undefined') { alert('SheetJS 라이브러리가 로드되지 않았습니다.'); return; }
      const wb = XLSX.utils.book_new();
      const filtered = statements.filter(s =>
        String(s.연도) === String(year) && String(s.월) === String(month)
      );

      // UI 카드와 동일한 구조로 현장별 1행씩 생성
      const rows = siteList.map(site => {
        const siteStmts  = filtered.filter(s => s.현장명 === site);
        const isSubmitted = siteStmts.length > 0;
        const contractAmt = isSubmitted ? parseAmount(siteStmts[0].계약금액) : 0;
        const prevTotal   = siteStmts.reduce((sum, s) => sum + parseAmount(s.전회기성), 0);
        const curTotal    = siteStmts.reduce((sum, s) => sum + parseAmount(s.금회기성), 0);
        const cumTotal    = siteStmts.reduce((sum, s) => sum + parseAmount(s.누계기성), 0);
        const rate        = contractAmt > 0 ? (cumTotal / contractAmt) * 100 : 0;
        const rounds      = [...new Set(siteStmts.map(s => s.회차).filter(Boolean))].join(', ');
        return {
          '현장명':   site,
          '연도':     Number(year),
          '월':       Number(month),
          '회차':     rounds || '-',
          '계약금액': contractAmt,
          '전회':     prevTotal,
          '금회':     curTotal,
          '누계':     cumTotal,
          '기성률':   contractAmt > 0 ? `${rate.toFixed(1)}%` : '-',
          '제출여부': isSubmitted ? '제출완료' : '미제출',
        };
      });

      // 합계 행
      const sumContract = rows.reduce((s, r) => s + r['계약금액'], 0);
      const sumPrev     = rows.reduce((s, r) => s + r['전회'], 0);
      const sumCur      = rows.reduce((s, r) => s + r['금회'], 0);
      const sumCum      = rows.reduce((s, r) => s + r['누계'], 0);
      const sumRate     = sumContract > 0 ? `${((sumCum / sumContract) * 100).toFixed(1)}%` : '-';
      const submitCount = rows.filter(r => r['제출여부'] === '제출완료').length;
      rows.push({
        '현장명':   '합계',
        '연도':     '',
        '월':       '',
        '회차':     '',
        '계약금액': sumContract,
        '전회':     sumPrev,
        '금회':     sumCur,
        '누계':     sumCum,
        '기성률':   sumRate,
        '제출여부': `${submitCount}/${siteList.length} 제출`,
      });

      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [
        { wch: 26 }, { wch: 6 }, { wch: 4 }, { wch: 8 },
        { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 16 },
        { wch: 8 },  { wch: 12 },
      ];
      XLSX.utils.book_append_sheet(wb, ws, `${year}년 ${month}월 현황`);
      XLSX.writeFile(wb, `기성현황_${year}년_${month}월.xlsx`);
    };

    const exportAllToExcel = (statements) => {
      if (typeof XLSX === 'undefined') { alert('SheetJS 라이브러리가 로드되지 않았습니다.'); return; }
      const wb = XLSX.utils.book_new();
      const allData = statements.map(s => ({
        '이름': s.이름, '직책': s.직책, '이메일': s.이메일, '현장명': s.현장명,
        '연도': s.연도, '월': s.월, '회차': s.회차, '공종': s.공종,
        '계약금액': parseAmount(s.계약금액), '전회기성': parseAmount(s.전회기성),
        '금회기성': parseAmount(s.금회기성), '누계기성': parseAmount(s.누계기성),
        '잔여금액': parseAmount(s.잔여금액), '기성률': s.기성률, '업데이트': s.업데이트
      }));
      const ws = XLSX.utils.json_to_sheet(allData);
      ws['!cols'] = [
        { wch: 12 }, { wch: 12 }, { wch: 25 }, { wch: 26 }, { wch: 6 }, { wch: 4 },
        { wch: 5 }, { wch: 12 }, { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 16 },
        { wch: 16 }, { wch: 8 }, { wch: 14 }
      ];
      XLSX.utils.book_append_sheet(wb, ws, '전체 기성 데이터');
      XLSX.writeFile(wb, `전체_기성현황_${new Date().toISOString().split('T')[0]}.xlsx`);
    };

    // ==========================================
    // 로그인 화면 컴포넌트
    // ==========================================
    const LoginScreen = ({ onLogin, isLoading, error }) => {
      const [id, setId]             = useState('');
      const [password, setPassword] = useState('');
      const [showPwd, setShowPwd]   = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (id.trim() && password.trim()) onLogin(id.trim(), password.trim());
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-100 to-blue-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border border-gray-100 animate-fade-in">
            <div className="text-center mb-8">
              <img src="icon.png" alt="SAMJIN Hub" className="w-16 h-16 rounded-2xl shadow-lg mx-auto mb-4 object-cover" />
              <h1 className="text-2xl font-extrabold text-gray-900 tracking-tight">SAMJIN Hub</h1>
              <p className="text-sm text-gray-400 mt-1 font-medium">SAMJIN Hub — 기성 관리 시스템</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1.5">아이디</label>
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400" style={{fontSize:'18px'}}>person</span>
                  <input type="text" value={id} onChange={e => setId(e.target.value)}
                    placeholder="아이디를 입력하세요"
                    className="w-full border border-gray-300 pl-9 pr-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    required autoFocus autoComplete="username" />
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1.5">비밀번호</label>
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400" style={{fontSize:'18px'}}>lock</span>
                  <input type={showPwd ? 'text' : 'password'} value={password} onChange={e => setPassword(e.target.value)}
                    placeholder="비밀번호를 입력하세요"
                    className="w-full border border-gray-300 pl-9 pr-10 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    required autoComplete="current-password" />
                  <button type="button" onClick={() => setShowPwd(v => !v)} tabIndex={-1}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 transition-colors">
                    <span className="material-symbols-outlined" style={{fontSize:'18px'}}>{showPwd ? 'visibility_off' : 'visibility'}</span>
                  </button>
                </div>
              </div>

              {error && (
                <div className="bg-red-50 border border-red-100 text-red-600 p-3 rounded-xl text-xs font-medium flex items-start gap-2 animate-fade-in">
                  <span className="material-symbols-outlined flex-shrink-0 mt-0.5" style={{fontSize:'16px'}}>error</span>
                  <span>{error}</span>
                </div>
              )}

              <button type="submit" disabled={isLoading || !id.trim() || !password.trim()}
                className="w-full py-3 mt-2 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition-all disabled:opacity-50 flex justify-center items-center gap-2">
                {isLoading
                  ? <><span className="material-symbols-outlined animate-spin" style={{fontSize:'18px'}}>sync</span> 로그인 중...</>
                  : <><span className="material-symbols-outlined" style={{fontSize:'18px'}}>login</span> 로그인</>
                }
              </button>
            </form>

            <p className="text-center text-[11px] text-gray-400 mt-6">계정 문의는 관리자에게 연락하세요</p>
          </div>
        </div>
      );
    };

    // ==========================================
    // 보안설정 컴포넌트
    // siteList   : DB정보에서 추출한 현장 목록
    // dbUserList : DB정보 전체 행 (ID·비밀번호·현장명·회사·계약금액)
    // onRefreshDb: DB 재조회 콜백
    // ==========================================
    const SecurityTab = ({ contracts, setContracts, isAdmin, setIsPwdModalOpen, siteList, dbUserList, onRefreshDb }) => {

      // 신규 현장 모달
      const [showModal,    setShowModal]    = useState(false);
      const [form, setForm] = useState({ 현장명: '', ID: '', 비밀번호: '', 회사: '', 계약금액: '' });
      const [isSending,    setIsSending]    = useState(false);
      const [sendResult,   setSendResult]   = useState(null); // 'ok' | 'err: ...'
      const [showPwdMap,   setShowPwdMap]   = useState({});   // {rowIndex: bool}
      const [isRefreshing, setIsRefreshing] = useState(false);

      if (!isAdmin) {
        return (
          <div className="flex flex-col items-center justify-center p-12 bg-white rounded-xl border border-gray-200 shadow-sm">
            <span className="material-symbols-outlined text-5xl text-gray-300 mb-4">lock</span>
            <h2 className="text-xl font-bold text-gray-800 mb-2">보안 설정 접근 제한</h2>
            <p className="text-sm text-gray-500 mb-6 text-center">이 탭은 현장 DB 정보를 관리하는 곳으로,<br/>관리자 권한이 필요합니다.</p>
            <button onClick={() => setIsPwdModalOpen(true)} className="px-6 py-2.5 bg-gray-900 text-white font-bold rounded-lg hover:bg-black transition-colors">
              관리자 인증하기
            </button>
          </div>
        );
      }

      const handleFormChange = (field, raw) => {
        if (field === '계약금액') {
          const num = raw.replace(/\D/g, '');
          setForm(f => ({ ...f, 계약금액: num ? Number(num).toLocaleString() : '' }));
        } else {
          setForm(f => ({ ...f, [field]: raw }));
        }
      };

      const handleCreateSite = async (e) => {
        e.preventDefault();
        setSendResult(null);
        setIsSending(true);
        try {
          const payload = {
            현장명:   form.현장명.trim(),
            ID:       form.ID.trim(),
            비밀번호: form.비밀번호.trim(),
            회사:     form.회사.trim(),
            계약금액: parseInt(form.계약금액.replace(/,/g, ''), 10) || 0,
          };
          const res = await fetchWithTimeout(WEBHOOK_NEW_SITE_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/plain, */*' },
            body:    JSON.stringify(payload),
          });
          if (!res.ok) {
            const errText = await res.text().catch(() => '');
            throw new Error(`HTTP ${res.status}${errText ? ' — ' + errText.slice(0, 100) : ''}`);
          }
          setSendResult('ok');
          setForm({ 현장명: '', ID: '', 비밀번호: '', 회사: '', 계약금액: '' });
          // n8n이 구글시트에 기록할 시간을 주고 새로고침
          setTimeout(async () => {
            if (onRefreshDb) {
              setIsRefreshing(true);
              try { await onRefreshDb(); } catch (_) {}
              finally { setIsRefreshing(false); }
            }
          }, 2000);
        } catch (err) {
          setSendResult('err: ' + err.message);
        } finally {
          setIsSending(false);
        }
      };

      const handleRefresh = async () => {
        if (!onRefreshDb || isRefreshing) return;
        setIsRefreshing(true);
        try { await onRefreshDb(); } catch (_) {}
        finally { setIsRefreshing(false); }
      };

      const togglePwd = (idx) => setShowPwdMap(prev => ({ ...prev, [idx]: !prev[idx] }));

      return (
        <div className="space-y-4 animate-fade-in">

          {/* 헤더 */}
          <div className="flex items-center justify-between bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <div className="flex items-center gap-2">
              <span className="material-symbols-outlined text-blue-600">admin_panel_settings</span>
              <h2 className="font-bold text-gray-800">현장 DB 관리 (관리자)</h2>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={handleRefresh} disabled={isRefreshing}
                className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-bold flex items-center gap-1 hover:bg-gray-200 transition-colors border border-gray-200 disabled:opacity-50">
                <span className={`material-symbols-outlined ${isRefreshing ? 'animate-spin' : ''}`} style={{fontSize:'15px'}}>refresh</span>
                {isRefreshing ? '조회 중...' : '새로고침'}
              </button>
              <button onClick={() => { setShowModal(true); setSendResult(null); }}
                className="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-bold flex items-center gap-1 hover:bg-blue-700 transition-colors shadow-sm">
                <span className="material-symbols-outlined" style={{fontSize:'15px'}}>add</span>
                신규 현장생성
              </button>
            </div>
          </div>

          {/* DB 현장 목록 테이블 */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
              <span className="text-sm font-bold text-gray-700">등록된 현장 목록</span>
              <span className="text-xs text-gray-400 font-medium">총 {dbUserList.length}건</span>
            </div>
            {dbUserList.length === 0 ? (
              <div className="text-center p-10 text-gray-400 text-sm flex flex-col items-center gap-2">
                <span className="material-symbols-outlined text-3xl text-gray-300">domain</span>
                DB에 등록된 현장이 없습니다.
              </div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead className="bg-gray-50 border-b border-gray-100">
                    <tr>
                      <th className="text-left px-4 py-2.5 text-xs font-bold text-gray-500 w-6">#</th>
                      <th className="text-left px-4 py-2.5 text-xs font-bold text-gray-500">현장명</th>
                      <th className="text-left px-4 py-2.5 text-xs font-bold text-gray-500">아이디</th>
                      <th className="text-left px-4 py-2.5 text-xs font-bold text-gray-500">비밀번호</th>
                      <th className="text-right px-4 py-2.5 text-xs font-bold text-gray-500">계약금액</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {dbUserList.map((u, idx) => {
                      const amt = parseAmount(u['계약금액']);
                      return (
                        <tr key={idx} className="hover:bg-gray-50 transition-colors">
                          <td className="px-4 py-3 text-xs text-gray-400">{idx + 1}</td>
                          <td className="px-4 py-3 font-bold text-gray-800 text-xs">{String(u['현장명'] ?? '-')}</td>
                          <td className="px-4 py-3 text-xs text-gray-600 font-mono">{String(u['ID'] ?? '-')}</td>
                          <td className="px-4 py-3 text-xs">
                            <div className="flex items-center gap-1.5">
                              <span className="font-mono text-gray-600">
                                {showPwdMap[idx] ? String(u['비밀번호'] ?? '-') : '••••••'}
                              </span>
                              <button onClick={() => togglePwd(idx)}
                                className="text-gray-400 hover:text-gray-600 transition-colors flex-shrink-0">
                                <span className="material-symbols-outlined" style={{fontSize:'14px'}}>
                                  {showPwdMap[idx] ? 'visibility_off' : 'visibility'}
                                </span>
                              </button>
                            </div>
                          </td>
                          <td className="px-4 py-3 text-xs font-bold text-right tabular-nums text-blue-700">
                            {amt > 0 ? `₩${amt.toLocaleString()}` : <span className="text-gray-300">-</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* 신규 현장생성 모달 */}
          {showModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl border border-gray-100">
                <div className="flex items-center justify-between mb-5">
                  <div className="flex items-center gap-2">
                    <span className="material-symbols-outlined text-blue-600">add_business</span>
                    <h3 className="font-extrabold text-gray-800">신규 현장 생성</h3>
                  </div>
                  <button onClick={() => { setShowModal(false); setSendResult(null); }}
                    className="text-gray-400 hover:text-gray-700 transition-colors">
                    <span className="material-symbols-outlined">close</span>
                  </button>
                </div>

                <form onSubmit={handleCreateSite} className="space-y-3">
                  {[
                    { field: '현장명',   placeholder: '현장명을 입력하세요',     type: 'text' },
                    { field: 'ID',       placeholder: '로그인 아이디',           type: 'text' },
                    { field: '비밀번호', placeholder: '비밀번호',                type: 'text' },
                    { field: '회사',     placeholder: '회사명',                  type: 'text' },
                  ].map(({ field, placeholder, type }) => (
                    <div key={field}>
                      <label className="block text-xs font-bold text-gray-600 mb-1">{field}</label>
                      <input type={type} value={form[field]} required
                        onChange={e => handleFormChange(field, e.target.value)}
                        placeholder={placeholder}
                        className="w-full border border-gray-300 px-3 py-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" />
                    </div>
                  ))}
                  <div>
                    <label className="block text-xs font-bold text-gray-600 mb-1">계약금액 (원)</label>
                    <input type="text" value={form.계약금액} required
                      onChange={e => handleFormChange('계약금액', e.target.value)}
                      placeholder="예: 10,000,000,000"
                      className="w-full border border-gray-300 px-3 py-2.5 rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" />
                    <div className="mt-1 text-[11px] text-gray-400 h-4">
                      {form.계약금액 && numberToKorean(parseInt(form.계약금액.replace(/,/g, '')))}
                    </div>
                  </div>

                  {sendResult === 'ok' && (
                    <div className="text-xs font-bold text-green-600 bg-green-50 p-2.5 rounded-lg border border-green-200 flex items-center gap-1.5">
                      <span className="material-symbols-outlined" style={{fontSize:'14px'}}>check_circle</span>
                      현장이 성공적으로 등록되었습니다.
                    </div>
                  )}
                  {sendResult && sendResult.startsWith('err') && (
                    <div className="text-xs font-bold text-red-600 bg-red-50 p-2.5 rounded-lg border border-red-200">
                      {sendResult.replace('err: ', '')}
                    </div>
                  )}

                  <div className="flex gap-2 pt-1">
                    <button type="button" onClick={() => { setShowModal(false); setSendResult(null); }}
                      className="flex-1 py-2.5 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition-colors text-sm">
                      취소
                    </button>
                    <button type="submit" disabled={isSending}
                      className="flex-1 py-2.5 bg-blue-600 text-white font-bold rounded-lg shadow hover:bg-blue-700 transition-colors text-sm disabled:opacity-50 flex items-center justify-center gap-1">
                      {isSending
                        ? <><span className="material-symbols-outlined animate-spin" style={{fontSize:'15px'}}>sync</span> 전송 중...</>
                        : <><span className="material-symbols-outlined" style={{fontSize:'15px'}}>send</span> 등록하기</>
                      }
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // 월별 현황 탭 컴포넌트
    // siteList    : DB정보에서 추출한 현장 목록 (공란 제거)
    // currentUser : 로그인 사용자 정보
    // isAdmin     : master 또는 관리자 인증 여부
    //
    // 금액 표시 규칙:
    //   isAdmin                         → 모든 현장 금액 표시
    //   !isAdmin && site===내 현장      → 내 현장만 금액 표시
    //   !isAdmin && site!==내 현장     → 금액 숨김
    // ==========================================
    const MonthlyTab = ({ statements, isLoading, loadError, isAdmin, setIsPwdModalOpen, siteList, currentUser }) => {
      const currentYear  = new Date().getFullYear();
      const currentMonth = new Date().getMonth() + 1;

      const yearSet = new Set(statements.map(s => Number(s.연도)).filter(y => y > 2000 && !isNaN(y)));
      yearSet.add(currentYear);
      const years = [...yearSet].sort((a, b) => b - a);

      const [selectedYear,  setSelectedYear]  = useState(String(currentYear));
      const [selectedMonth, setSelectedMonth] = useState(String(currentMonth));

      const filtered = statements.filter(s =>
        String(s.연도) === selectedYear && String(s.월) === selectedMonth
      );

      const total       = siteList.length;
      const submitted   = siteList.filter(site => filtered.some(s => s.현장명 === site)).length;
      const notSubmitted = total - submitted;
      const submitPct   = total > 0 ? Math.round((submitted / total) * 100) : 0;

      // 금회합계: 관리자는 전체, 일반사용자는 내 현장만
      const totalAll  = filtered.reduce((sum, s) => sum + parseAmount(s.금회기성), 0);
      const totalMine = filtered
        .filter(s => s.현장명 === currentUser.siteName)
        .reduce((sum, s) => sum + parseAmount(s.금회기성), 0);

      return (
        <div className="space-y-4 animate-fade-in">

          {/* 헤더 */}
          <div className="flex flex-wrap justify-between items-center gap-3 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h2 className="font-bold flex items-center gap-2 text-gray-800">
              <span className="material-symbols-outlined text-blue-600">calendar_month</span>
              월별 제출 현황
              {!isAdmin && (
                <span className="text-[11px] font-normal text-gray-400 ml-1">({currentUser.siteName})</span>
              )}
            </h2>
            <div className="flex items-center gap-2 flex-wrap">
              <select value={selectedYear} onChange={e => setSelectedYear(e.target.value)}
                className="border border-gray-300 rounded-lg px-2 py-1.5 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                {years.map(y => <option key={y} value={y}>{y}년</option>)}
              </select>
              <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
                className="border border-gray-300 rounded-lg px-2 py-1.5 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                {[...Array(12)].map((_, i) => <option key={i+1} value={i+1}>{i+1}월</option>)}
              </select>
              <button
                onClick={() => exportMonthlyToExcel(statements, selectedYear, selectedMonth, siteList)}
                className="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-sm font-bold flex items-center gap-1 hover:bg-emerald-700 transition-colors shadow-sm">
                <span className="material-symbols-outlined" style={{fontSize:'16px'}}>download</span>
                엑셀 다운로드
              </button>
            </div>
          </div>

          {/* 통계 카드 */}
          <div className="grid grid-cols-3 gap-3">
            {/* 제출완료 */}
            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
              <div className="text-xs font-bold text-gray-500 mb-1">제출완료</div>
              <div className="text-2xl font-extrabold text-green-600">
                {submitted}<span className="text-sm text-gray-400 font-normal">/{total}</span>
              </div>
              <div className="w-full bg-gray-100 rounded-full h-1.5 mt-2">
                <div className="bg-green-500 h-1.5 rounded-full transition-all duration-500" style={{width:`${submitPct}%`}}></div>
              </div>
              <div className="text-[10px] text-gray-400 mt-1">{submitPct}% 제출</div>
            </div>

            {/* 미제출 */}
            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
              <div className="text-xs font-bold text-gray-500 mb-1">미제출</div>
              <div className="text-2xl font-extrabold text-red-500">{notSubmitted}</div>
              <div className="text-[10px] text-gray-400 mt-3">현장 미제출</div>
            </div>

            {/* 금회합계 */}
            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
              <div className="text-xs font-bold text-gray-500 mb-1">
                {isAdmin ? '금회합계' : '내 현장 금회'}
              </div>
              <div className="text-xs font-extrabold text-blue-700 mt-1 break-all leading-tight">
                {isAdmin
                  ? `₩${totalAll.toLocaleString()}`
                  : totalMine > 0
                    ? `₩${totalMine.toLocaleString()}`
                    : <span className="text-gray-400 font-normal">미제출</span>
                }
              </div>
              <div className="text-[10px] text-gray-400 mt-1">
                {isAdmin ? '전체 합산' : currentUser.siteName}
              </div>
            </div>
          </div>

          {/* 현장 그리드 */}
          {isLoading ? (
            <div className="text-center p-14 text-gray-400 font-medium flex flex-col items-center gap-3">
              <span className="material-symbols-outlined animate-spin text-4xl text-blue-400">sync</span>
              <span>데이터 로딩 중...</span>
            </div>
          ) : loadError ? (
            <div className="text-center p-8 text-amber-600 text-sm bg-amber-50 rounded-xl border border-amber-200">
              데이터를 불러오지 못했습니다. 기성내역서 탭에서 다시 시도해 주세요.
            </div>
          ) : siteList.length === 0 ? (
            <div className="text-center p-10 text-gray-400 text-sm bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col items-center gap-2">
              <span className="material-symbols-outlined text-3xl text-gray-300">domain</span>
              DB에 등록된 현장이 없습니다.
            </div>
          ) : (
            <div className="grid grid-cols-2 gap-3">
              {siteList.map(site => {
                const siteStmts    = filtered.filter(s => s.현장명 === site);
                const isSubmitted  = siteStmts.length > 0;
                const categories   = [...new Set(siteStmts.map(s => s.공종))];
                const contractAmt  = isSubmitted ? parseAmount(siteStmts[0].계약금액) : 0;
                const prevTotal    = siteStmts.reduce((sum, s) => sum + parseAmount(s.전회기성), 0);
                const curTotal     = siteStmts.reduce((sum, s) => sum + parseAmount(s.금회기성), 0);
                const cumTotal     = siteStmts.reduce((sum, s) => sum + parseAmount(s.누계기성), 0);
                const rate         = contractAmt > 0 ? (cumTotal / contractAmt) * 100 : 0;
                const canSeeAmount = isAdmin || site === currentUser.siteName;
                const isOwnSite    = site === currentUser.siteName;
                const colorText    = isOwnSite && !isAdmin ? 'text-blue-700'  : 'text-green-700';
                const colorBadge   = isOwnSite && !isAdmin ? 'bg-blue-200 text-blue-800' : 'bg-green-200 text-green-800';
                const colorBar     = isOwnSite && !isAdmin ? 'bg-blue-500'    : 'bg-green-500';

                return (
                  <div key={site}
                    className={`p-4 rounded-xl border transition-all ${
                      isSubmitted
                        ? isOwnSite && !isAdmin ? 'bg-blue-50 border-blue-200' : 'bg-green-50 border-green-200'
                        : 'bg-gray-50 border-gray-200'
                    }`}
                  >
                    {/* 현장명 + 상태 아이콘 */}
                    <div className="flex items-center gap-2 mb-2">
                      <span
                        className={`material-symbols-outlined flex-shrink-0 ${
                          isSubmitted ? (isOwnSite && !isAdmin ? 'text-blue-500' : 'text-green-500') : 'text-gray-300'
                        }`}
                        style={{fontSize:'18px'}}
                      >
                        {isSubmitted ? 'check_circle' : 'radio_button_unchecked'}
                      </span>
                      <span className={`text-sm font-bold truncate ${
                        isSubmitted ? (isOwnSite && !isAdmin ? 'text-blue-900' : 'text-green-900') : 'text-gray-500'
                      }`}>
                        {site}
                      </span>
                      {isOwnSite && !isAdmin && (
                        <span className="ml-1 text-[9px] bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded font-bold shrink-0">내 현장</span>
                      )}
                      {/* 공종 뱃지 */}
                      <div className="flex flex-wrap gap-1 ml-auto shrink-0">
                        {categories.map(cat => (
                          <span key={cat} className={`text-[9px] px-1.5 py-0.5 rounded font-bold ${colorBadge}`}>{cat}</span>
                        ))}
                      </div>
                    </div>

                    {isSubmitted ? (
                      canSeeAmount ? (
                        <div className="space-y-1">
                          {/* 금액 4행 */}
                          {[
                            { label: '계약금액', value: contractAmt },
                            { label: '전  회',   value: prevTotal },
                            { label: '금  회',   value: curTotal },
                            { label: '누  계',   value: cumTotal },
                          ].map(({ label, value }) => (
                            <div key={label} className="flex items-center justify-between">
                              <span className="text-[11px] text-gray-500 w-16 shrink-0">{label}</span>
                              <span className={`text-[11px] font-bold tabular-nums ${colorText}`}>
                                ₩{value.toLocaleString()}
                              </span>
                            </div>
                          ))}
                          {/* 기성률 + 프로그레스바 */}
                          <div className="pt-1">
                            <div className="flex items-center justify-between mb-1">
                              <span className="text-[11px] text-gray-500 w-16 shrink-0">기성률</span>
                              <span className={`text-[11px] font-extrabold tabular-nums ${colorText}`}>
                                {rate.toFixed(1)}%
                              </span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-1.5">
                              <div
                                className={`h-1.5 rounded-full transition-all duration-500 ${colorBar}`}
                                style={{width:`${Math.min(rate, 100)}%`}}
                              />
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="text-[11px] text-gray-400 mt-1">금액 비공개</div>
                      )
                    ) : (
                      <div className="text-[11px] text-gray-400">미제출</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // 비밀번호 변경 모달 컴포넌트
    // - 현재 비밀번호 확인 후 새 비밀번호로 변경
    // - WEBHOOK_PWD_URL로 로그인 정보 전체 전송
    // ==========================================
    const ChangePwdModal = ({ currentUser, onClose, onSuccess }) => {
      const [newPwd,     setNewPwd]     = useState('');
      const [confirmPwd, setConfirmPwd] = useState('');
      const [showNew,    setShowNew]    = useState(false);
      const [showConf,   setShowConf]   = useState(false);
      const [isSending,  setIsSending]  = useState(false);
      const [errMsg,     setErrMsg]     = useState('');
      const [successMsg, setSuccessMsg] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setErrMsg('');
        setSuccessMsg('');

        if (newPwd.length < 4) { setErrMsg('새 비밀번호는 4자리 이상이어야 합니다.'); return; }
        if (newPwd !== confirmPwd) { setErrMsg('새 비밀번호와 확인이 일치하지 않습니다.'); return; }
        if (newPwd === currentUser.password) { setErrMsg('현재 비밀번호와 동일합니다. 다른 비밀번호를 입력하세요.'); return; }

        setIsSending(true);
        try {
          // 웹훅으로 로그인 정보 전체 + 새 비밀번호 전송
          const payload = {
            ID:           currentUser.id,
            현재비밀번호: currentUser.password,
            새비밀번호:   newPwd,
            현장명:       currentUser.siteName,
            회사:         currentUser.company,
            계약금액:     currentUser.contractAmount
          };
          console.log('[changePwd] 전송:', JSON.stringify(payload, null, 2));

          const res = await fetchWithTimeout(WEBHOOK_PWD_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/plain, */*' },
            body:    JSON.stringify(payload)
          });

          if (!res.ok) {
            const errText = await res.text().catch(() => '');
            throw new Error(`HTTP ${res.status}${errText ? ' — ' + errText.slice(0, 120) : ''}`);
          }

          setSuccessMsg('비밀번호가 성공적으로 변경되었습니다.');
          setTimeout(() => onSuccess(newPwd), 1500);

        } catch (e) {
          const isNet = e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('시간 초과');
          setErrMsg(isNet
            ? 'n8n 서버에 연결할 수 없습니다. 워크플로우 활성 상태를 확인하세요.'
            : e.message
          );
        } finally {
          setIsSending(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm animate-fade-in">
          <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl border border-gray-100">
            {/* 헤더 */}
            <div className="flex justify-between items-center mb-5">
              <h3 className="font-bold text-gray-800 flex items-center gap-2">
                <span className="material-symbols-outlined text-blue-600">key</span>
                비밀번호 변경
              </h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-700 transition-colors">
                <span className="material-symbols-outlined">close</span>
              </button>
            </div>

            {/* 현재 계정 정보 (읽기 전용) */}
            <div className="bg-gray-50 rounded-xl p-3 mb-5 border border-gray-200">
              <p className="text-[11px] text-gray-500 font-bold mb-1">현재 계정 정보</p>
              <div className="grid grid-cols-2 gap-1 text-[11px] text-gray-700">
                <div>ID: <span className="font-bold text-gray-900">{currentUser.id}</span></div>
                <div>현장: <span className="font-bold text-gray-900">{currentUser.siteName || '—'}</span></div>
                <div>회사: <span className="font-bold text-gray-900">{currentUser.company || '—'}</span></div>
                <div>현재 PW: <span className="font-mono font-bold text-gray-900">{'•'.repeat(Math.min(currentUser.password.length, 8))}</span></div>
              </div>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              {/* 새 비밀번호 */}
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1.5">새 비밀번호</label>
                <div className="relative">
                  <input
                    type={showNew ? 'text' : 'password'}
                    value={newPwd}
                    onChange={e => setNewPwd(e.target.value)}
                    placeholder="새 비밀번호 입력"
                    className="w-full border border-gray-300 pl-3 pr-10 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500"
                    required autoFocus
                  />
                  <button type="button" onClick={() => setShowNew(v => !v)} tabIndex={-1}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700">
                    <span className="material-symbols-outlined" style={{fontSize:'16px'}}>{showNew ? 'visibility_off' : 'visibility'}</span>
                  </button>
                </div>
              </div>

              {/* 비밀번호 확인 */}
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1.5">새 비밀번호 확인</label>
                <div className="relative">
                  <input
                    type={showConf ? 'text' : 'password'}
                    value={confirmPwd}
                    onChange={e => setConfirmPwd(e.target.value)}
                    placeholder="새 비밀번호 재입력"
                    className={`w-full border pl-3 pr-10 py-2.5 rounded-xl text-sm outline-none focus:ring-2 transition-colors ${
                      confirmPwd && newPwd !== confirmPwd
                        ? 'border-red-300 focus:ring-red-400'
                        : confirmPwd && newPwd === confirmPwd
                          ? 'border-green-300 focus:ring-green-400'
                          : 'border-gray-300 focus:ring-blue-500'
                    }`}
                    required
                  />
                  <button type="button" onClick={() => setShowConf(v => !v)} tabIndex={-1}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700">
                    <span className="material-symbols-outlined" style={{fontSize:'16px'}}>{showConf ? 'visibility_off' : 'visibility'}</span>
                  </button>
                </div>
                {confirmPwd && newPwd !== confirmPwd && (
                  <p className="text-[10px] text-red-500 mt-1 flex items-center gap-0.5">
                    <span className="material-symbols-outlined" style={{fontSize:'12px'}}>close</span>
                    비밀번호가 일치하지 않습니다
                  </p>
                )}
                {confirmPwd && newPwd === confirmPwd && (
                  <p className="text-[10px] text-green-600 mt-1 flex items-center gap-0.5">
                    <span className="material-symbols-outlined" style={{fontSize:'12px'}}>check</span>
                    비밀번호가 일치합니다
                  </p>
                )}
              </div>

              {/* 오류/성공 메시지 */}
              {errMsg && (
                <div className="bg-red-50 text-red-600 text-xs p-3 rounded-lg border border-red-100 flex items-start gap-2 animate-fade-in">
                  <span className="material-symbols-outlined flex-shrink-0 mt-0.5" style={{fontSize:'15px'}}>error</span>
                  {errMsg}
                </div>
              )}
              {successMsg && (
                <div className="bg-green-50 text-green-700 text-xs p-3 rounded-lg border border-green-100 flex items-center gap-2 font-bold animate-fade-in">
                  <span className="material-symbols-outlined" style={{fontSize:'15px'}}>check_circle</span>
                  {successMsg}
                </div>
              )}

              <div className="flex gap-2 pt-1">
                <button type="button" onClick={onClose} disabled={isSending}
                  className="flex-1 py-2.5 bg-gray-100 text-gray-700 font-bold rounded-xl text-sm hover:bg-gray-200 transition-colors disabled:opacity-50">
                  취소
                </button>
                <button type="submit" disabled={isSending || !newPwd || !confirmPwd}
                  className="flex-1 py-2.5 bg-blue-600 text-white font-bold rounded-xl text-sm shadow hover:bg-blue-700 transition-colors disabled:opacity-50 flex justify-center items-center gap-1.5">
                  {isSending
                    ? <><span className="material-symbols-outlined animate-spin" style={{fontSize:'15px'}}>sync</span> 변경 중...</>
                    : <><span className="material-symbols-outlined" style={{fontSize:'15px'}}>check</span> 변경하기</>
                  }
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // ==========================================
    // 기성내역서 탭 컴포넌트
    //
    // 금액 표시 규칙 (formatPrice):
    //   isAdmin                                → 모든 금액 표시
    //   !isAdmin && rowSiteName === 내 현장    → 내 현장 금액 표시
    //   !isAdmin && rowSiteName !== 내 현장   → ₩**,***,***
    // ==========================================
    const StatementsTab = ({
      statements, isLoading, isRefreshing, loadError, lastUpdated, loadData,
      currentUser, contracts, setContracts, isAdmin, setIsAdmin, setIsPwdModalOpen
    }) => {
      const [isFormModalOpen, setIsFormModalOpen] = useState(false);
      const [editingRowIndex, setEditingRowIndex] = useState(null);
      const [errorMsg, setErrorMsg]               = useState(null);
      const [isSubmitting, setIsSubmitting]       = useState(false);

      // ── 제출 후 10초 쿨다운 ─────────────────────────────────
      const [cooldownUntil,   setCooldownUntil]   = useState(0);
      const [cooldownLeft,    setCooldownLeft]    = useState(0);
      const [showCooldownMsg, setShowCooldownMsg] = useState(false);

      useEffect(() => {
        if (!cooldownUntil) return;
        const tick = setInterval(() => {
          const left = Math.ceil((cooldownUntil - Date.now()) / 1000);
          if (left <= 0) {
            setCooldownLeft(0);
            setCooldownUntil(0);
            clearInterval(tick);
          } else {
            setCooldownLeft(left);
          }
        }, 500);
        return () => clearInterval(tick);
      }, [cooldownUntil]);
      // ────────────────────────────────────────────────────────

      const [newForm, setNewForm] = useState({
        year: String(new Date().getFullYear()),
        month: String(new Date().getMonth() + 1),
        round: '1', category: '기계', amount: '', prevAmount: ''
      });

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        setErrorMsg(null);

        const isEditing     = editingRowIndex !== null;

        // ── 중복 청구 검사 (신규 제출 시에만) ──────────────────
        if (!isEditing) {
          const isDuplicate = statements.some(s =>
            String(s.연도)  === String(newForm.year)     &&
            String(s.월)    === String(newForm.month)    &&
            String(s.회차)  === String(newForm.round)    &&
            s.공종          === newForm.category          &&
            s.현장명        === currentUser.siteName
          );
          if (isDuplicate) {
            setErrorMsg({ title: '중복 청구', desc: '청구된 내역이 존재합니다.' });
            setIsSubmitting(false);
            return;
          }
        }
        // ────────────────────────────────────────────────────────

        const url           = isEditing ? WEBHOOK_EDIT_URL : WEBHOOK_LOAD_URL;
        const curAmount     = parseAmount(newForm.amount);
        const prevAmount    = parseAmount(newForm.prevAmount);
        const totalContract = contracts[currentUser.siteName] || 0;
        const cumulative    = prevAmount + curAmount;
        const remaining     = totalContract - cumulative;
        const rate          = totalContract > 0 ? (cumulative / totalContract) * 100 : 0;
        const uniqueCode    = `${currentUser.siteName}_${newForm.year}년_${newForm.month}월_${newForm.round}회차_${newForm.category}`.replace(/\s/g, '');

        const payload = {
          action: isEditing ? 'edit' : 'submit',
          ...(isEditing && { rowIndex: editingRowIndex }),
          data: {
            고유코드: uniqueCode,
            이름:     currentUser.name,
            직책:     currentUser.role,
            이메일:   currentUser.email,
            연도:     newForm.year,
            월:       newForm.month,
            회차:     newForm.round,
            현장명:   currentUser.siteName,
            공종:     newForm.category,
            계약금액: totalContract,
            전회기성: prevAmount,
            금회기성: curAmount,
            누계기성: cumulative,
            잔여금액: remaining,
            기성률:   parseFloat(rate.toFixed(2)),
            업데이트: new Date().toISOString().split('T')[0]
          }
        };

        try {
          const res = await fetchWithTimeout(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/plain, */*' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) {
            const errText = await res.text().catch(() => '');
            throw new Error(`HTTP ${res.status}${errText ? ' — ' + errText.slice(0, 120) : ''}`);
          }
          setIsFormModalOpen(false);
          setEditingRowIndex(null);
          setNewForm({ year: String(new Date().getFullYear()), month: String(new Date().getMonth() + 1), round: '1', category: '기계', amount: '', prevAmount: '' });
          // 제출 후 10초 쿨다운 시작
          const until = Date.now() + 10000;
          setCooldownUntil(until);
          setCooldownLeft(10);
          await new Promise(r => setTimeout(r, 7000)); // 구글시트 반영 대기 (7초)
          await loadData(true);
        } catch (e) {
          const isNetworkError = e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('시간 초과');
          setErrorMsg(isNetworkError
            ? { title: '서버 연결 실패', desc: 'n8n 워크플로우가 "테스트 실행" 중인지 확인하거나, 브라우저 보안 차단을 해제해주세요.', link: url }
            : { title: '저장 실패', desc: e.message }
          );
        } finally {
          setIsSubmitting(false);
        }
      };

      // 금액 표시: 관리자 or 내 현장이면 실제 금액, 아니면 마스킹
      const formatPrice = (val, rowSiteName = '') => {
        const num = parseAmount(val);
        const canSee = isAdmin || rowSiteName === currentUser.siteName;
        return canSee ? `₩${num.toLocaleString()}` : '₩**,***,***';
      };

      const lastUpdatedStr = lastUpdated
        ? lastUpdated.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        : null;

      return (
        <div className="space-y-4">

          {/* 쿨다운 토스트 */}
          {showCooldownMsg && (
            <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[9999] bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-xl animate-fade-in text-sm font-medium flex items-center gap-2">
              <span className="material-symbols-outlined animate-spin" style={{fontSize:'18px'}}>sync</span>
              로딩중입니다.
            </div>
          )}

          <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <div>
              <h2 className="font-bold flex items-center gap-2 text-gray-800">
                <span className="material-symbols-outlined text-blue-600">database</span>
                기성 리스트 내역
              </h2>
              {lastUpdatedStr && !isLoading && (
                <p className="text-[10px] text-gray-400 mt-0.5 ml-7">마지막 업데이트: {lastUpdatedStr}</p>
              )}
            </div>
            <div className="flex gap-2 items-center flex-wrap justify-end">
              <button onClick={() => isAdmin ? setIsAdmin(false) : setIsPwdModalOpen(true)}
                className="px-3 py-2 text-sm border border-gray-300 rounded-lg flex items-center gap-1 hover:bg-gray-50 transition-colors">
                <span className="material-symbols-outlined" style={{fontSize:'16px'}}>{isAdmin ? 'lock_open' : 'lock'}</span>
                {isAdmin ? '금액 숨기기' : '전체 금액'}
              </button>
              <button onClick={() => loadData(true)} disabled={isRefreshing || isLoading}
                className="px-3 py-2 text-sm border border-gray-300 rounded-lg flex items-center gap-1 hover:bg-gray-50 transition-colors disabled:opacity-40">
                <span className={`material-symbols-outlined ${isRefreshing ? 'animate-spin' : ''}`} style={{fontSize:'16px'}}>refresh</span>
                {isRefreshing ? '로딩...' : '새로고침'}
              </button>
              <button onClick={() => exportAllToExcel(statements)} disabled={isLoading || statements.length === 0}
                className="px-3 py-2 text-sm bg-emerald-600 text-white rounded-lg flex items-center gap-1 hover:bg-emerald-700 transition-colors disabled:opacity-40 shadow-sm font-bold">
                <span className="material-symbols-outlined" style={{fontSize:'16px'}}>download</span>
                전체 엑셀
              </button>
              <button onClick={() => {
                  if (cooldownLeft > 0) {
                    setShowCooldownMsg(true);
                    setTimeout(() => setShowCooldownMsg(false), 2500);
                    return;
                  }
                  setEditingRowIndex(null);
                  setNewForm({ year: String(new Date().getFullYear()), month: String(new Date().getMonth() + 1), round: '1', category: '기계', amount: '', prevAmount: '' });
                  setErrorMsg(null);
                  setIsFormModalOpen(true);
                }}
                className={`px-4 py-2 text-white rounded-lg text-sm font-bold shadow transition-colors ${
                  cooldownLeft > 0 ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'
                }`}>
                {cooldownLeft > 0 ? `처리중... (${cooldownLeft}초)` : '+ 새 기성 등록'}
              </button>
            </div>
          </div>

          {loadError && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 animate-fade-in">
              <div className="flex items-start gap-3">
                <span className="material-symbols-outlined text-amber-500 mt-0.5" style={{fontSize:'20px'}}>warning</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-bold text-amber-800">Google Sheets 데이터를 불러오지 못했습니다</p>
                  <p className="text-xs text-amber-700 mt-1 break-all">{loadError}</p>
                  <div className="mt-2 flex gap-3 flex-wrap text-xs font-bold text-amber-800">
                    <button onClick={() => loadData(true)} className="underline hover:text-amber-600 flex items-center gap-1">
                      <span className="material-symbols-outlined" style={{fontSize:'13px'}}>refresh</span> 다시 시도
                    </button>
                    <a href={`https://docs.google.com/spreadsheets/d/${SHEET_ID}`} target="_blank" rel="noreferrer" className="underline hover:text-amber-600 flex items-center gap-1">
                      <span className="material-symbols-outlined" style={{fontSize:'13px'}}>open_in_new</span> 시트 공유 설정 확인
                    </a>
                  </div>
                </div>
              </div>
              <div className="mt-3 bg-amber-100/60 rounded-lg p-3 text-[11px] text-amber-800 space-y-1">
                <p className="font-bold">📌 해결 방법</p>
                <p>① 구글 시트 <b>"공유"</b> → <b>"링크가 있는 모든 사용자"</b> → <b>"뷰어"</b> 설정</p>
                <p>② 시트명이 정확히 <b>"{SHEET_NAME}"</b> 인지 확인</p>
              </div>
            </div>
          )}

          <div className="grid gap-3">
            {isLoading ? (
              <div className="text-center p-14 text-gray-400 font-medium flex flex-col items-center gap-3">
                <span className="material-symbols-outlined animate-spin text-4xl text-blue-400">sync</span>
                <span>구글 시트에서 데이터를 불러오는 중...</span>
                <span className="text-[11px]">시트: {SHEET_NAME}</span>
              </div>
            ) : statements.length === 0 ? (
              <div className="text-center p-10 text-gray-400 text-sm bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col items-center gap-2">
                <span className="material-symbols-outlined text-3xl text-gray-300">inbox</span>
                {loadError ? '오류로 인해 데이터를 표시할 수 없습니다.' : '등록된 기성 내역이 없습니다.'}
              </div>
            ) : (
              statements.map((s, idx) => {
                const isOwnRow = s.이메일 === currentUser.email;
                return (
                  <div key={s._rowIndex ?? idx}
                    className={`bg-white p-4 rounded-xl border shadow-sm flex items-center justify-between hover:border-blue-400 transition-all animate-fade-in ${
                      isOwnRow ? 'border-blue-200' : 'border-gray-200'
                    }`}>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                        <span className="text-xs font-bold px-2 py-0.5 bg-gray-100 border border-gray-200 rounded text-gray-700 shrink-0">{s.공종}</span>
                        <h3 className="font-bold text-gray-900 truncate">{s.연도}년 {s.월}월 {s.회차}회차 — {s.현장명}</h3>
                        {isOwnRow && (
                          <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold shrink-0">내 기성</span>
                        )}
                      </div>
                      <div className="grid grid-cols-2 sm:grid-cols-4 gap-y-1 text-[11px] text-gray-500">
                        <div>계약: <span className="text-gray-900 font-medium">{formatPrice(s.계약금액, s.현장명)}</span></div>
                        <div>금회: <span className="text-blue-600 font-bold">{formatPrice(s.금회기성, s.현장명)}</span></div>
                        <div>누계: <span className="text-gray-900 font-medium">{formatPrice(s.누계기성, s.현장명)}</span></div>
                        <div>잔여: <span className="text-red-500 font-medium">{formatPrice(s.잔여금액, s.현장명)}</span></div>
                      </div>
                      <div className="mt-2 text-[10px] text-gray-400">
                        업데이트: {s.업데이트} | {s.이메일} | {s.이름} ({s.직책})
                      </div>
                    </div>
                    <div className="flex items-center gap-3 ml-4 border-l pl-4 border-gray-100 shrink-0">
                      <ProgressCircle percent={parseFloat(s.기성률 || 0)} />
                      {isOwnRow && (
                        <button onClick={() => {
                            setEditingRowIndex(s._rowIndex ?? idx + 2);
                            setNewForm({
                              year: String(s.연도 || new Date().getFullYear()),
                              month: String(s.월 || 1),
                              round: String(s.회차 || 1),
                              category: s.공종 || '기계',
                              amount: parseAmount(s.금회기성) > 0 ? parseAmount(s.금회기성).toLocaleString() : '',
                              prevAmount: parseAmount(s.전회기성) > 0 ? parseAmount(s.전회기성).toLocaleString() : ''
                            });
                            setErrorMsg(null);
                            setIsFormModalOpen(true);
                          }}
                          className="text-gray-400 hover:text-blue-600 transition-colors p-1">
                          <span className="material-symbols-outlined">edit_note</span>
                        </button>
                      )}
                    </div>
                  </div>
                );
              })
            )}
          </div>

          {isFormModalOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 overflow-y-auto backdrop-blur-sm">
              <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl my-auto animate-fade-in border border-gray-100">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <span className="material-symbols-outlined text-blue-600">{editingRowIndex !== null ? 'edit_document' : 'post_add'}</span>
                    {editingRowIndex !== null ? '기성 정보 수정' : '새 기성 정보 등록'}
                  </h3>
                  <button onClick={() => { setIsFormModalOpen(false); setEditingRowIndex(null); }}
                    className="text-gray-400 hover:text-gray-800 transition-colors">
                    <span className="material-symbols-outlined">close</span>
                  </button>
                </div>
                <form onSubmit={handleFormSubmit} className="space-y-5">
                  <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <div className="flex items-center justify-center gap-2 mb-3">
                      <span className="material-symbols-outlined text-gray-500" style={{fontSize:'18px'}}>calendar_month</span>
                      <span className="text-sm font-bold text-gray-700">청구 년월 및 회차 지정</span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <div className="text-center">
                        <label className="block text-[10px] text-gray-500 mb-1 font-medium">년도</label>
                        <input type="number" value={newForm.year} onChange={e => setNewForm({...newForm, year: e.target.value})}
                          className="w-full border border-gray-300 p-2 rounded-lg text-sm text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" required />
                      </div>
                      <div className="text-center">
                        <label className="block text-[10px] text-gray-500 mb-1 font-medium">월</label>
                        <select value={newForm.month} onChange={e => setNewForm({...newForm, month: e.target.value})}
                          className="w-full border border-gray-300 p-2 rounded-lg text-sm text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                          {[...Array(12)].map((_, i) => <option key={i+1} value={i+1}>{i+1}월</option>)}
                        </select>
                      </div>
                      <div className="text-center">
                        <label className="block text-[10px] text-gray-500 mb-1 font-medium">회차</label>
                        <div className="relative">
                          <input type="number" value={newForm.round} onChange={e => setNewForm({...newForm, round: e.target.value})}
                            className="w-full border border-gray-300 p-2 pr-6 rounded-lg text-sm text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" required />
                          <span className="absolute right-2 top-2.5 text-xs text-gray-500 font-bold">회</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-gray-600 mb-1">공종 (카테고리)</label>
                    <select value={newForm.category} onChange={e => setNewForm({...newForm, category: e.target.value})}
                      className="w-full border border-gray-300 p-2.5 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                      <option>기계</option><option>소방</option><option>소방(기계)</option><option>소방(전기)</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-gray-400 mb-1 flex justify-between">
                      <span>현장 전체 계약금액</span>
                      <span className="text-[9px] text-gray-400 font-normal">※ DB정보 기준 자동 적용</span>
                    </label>
                    <input type="text" readOnly
                      value={contracts[currentUser.siteName] ? contracts[currentUser.siteName].toLocaleString() + ' 원' : '설정되지 않음'}
                      className="w-full border border-gray-200 p-2.5 rounded-lg text-sm font-bold bg-gray-100 text-gray-500 cursor-not-allowed outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[11px] font-bold text-gray-600 mb-1">전회까지 누계기성</label>
                      <input type="text" placeholder="입력" value={newForm.prevAmount}
                        onChange={e => setNewForm({...newForm, prevAmount: e.target.value.replace(/\D/g,'').replace(/\B(?=(\d{3})+(?!\d))/g, ",")})}
                        className="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-blue-600 mb-1">금회 청구금액</label>
                      <input type="text" placeholder="입력" value={newForm.amount}
                        onChange={e => setNewForm({...newForm, amount: e.target.value.replace(/\D/g,'').replace(/\B(?=(\d{3})+(?!\d))/g, ",")})}
                        className="w-full border-2 border-blue-200 bg-blue-50/30 p-2.5 rounded-lg text-sm font-bold text-blue-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none" required />
                    </div>
                  </div>
                  <div className="bg-blue-50 p-3 rounded-lg border border-blue-100 flex items-center justify-between">
                    <span className="text-[11px] text-blue-500 font-bold">한글 금액 (금회)</span>
                    <span className="text-sm font-bold text-blue-800">{numberToKorean(parseAmount(newForm.amount)) || '0 원'}</span>
                  </div>
                  {errorMsg && (
                    <div className="bg-red-50 text-red-600 p-4 rounded-lg text-xs border border-red-100 flex flex-col gap-2 animate-fade-in">
                      <div className="font-bold flex items-center gap-1.5">
                        <span className="material-symbols-outlined" style={{fontSize:'18px'}}>error</span>
                        {errorMsg.title}
                      </div>
                      {errorMsg.desc && <div className="text-gray-700 ml-6 leading-relaxed">{errorMsg.desc}</div>}
                      {errorMsg.link && (
                        <a href={errorMsg.link} target="_blank" rel="noreferrer"
                          className="inline-flex items-center gap-1 text-blue-700 font-bold hover:underline bg-blue-100/50 w-fit px-3 py-1.5 rounded border border-blue-200 ml-6 mt-1">
                          <span className="material-symbols-outlined" style={{fontSize:'14px'}}>open_in_new</span>
                          보안 차단 해제하러 가기
                        </a>
                      )}
                    </div>
                  )}
                  <button type="submit" disabled={isSubmitting}
                    className="w-full py-3 mt-2 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition-all disabled:opacity-50 flex justify-center items-center gap-2">
                    {isSubmitting
                      ? <><span className="material-symbols-outlined animate-spin" style={{fontSize:'16px'}}>sync</span> 전송 중...</>
                      : editingRowIndex !== null ? '시트 정보 업데이트' : '기성 정보 등록 및 시트 전송'
                    }
                  </button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // 메인 앱 컨테이너
    // ==========================================
    const App = () => {
      // ---- 로그인 상태 ----
      const [isLoggedIn,     setIsLoggedIn]     = useState(false);
      const [currentUser,    setCurrentUser]    = useState(null);
      const [isLoginLoading, setIsLoginLoading] = useState(false);
      const [loginError,     setLoginError]     = useState(null);

      // ==========================================
      // 페이지 로드 시 localStorage 세션 복원
      // ==========================================
      useEffect(() => {
        try {
          const saved = localStorage.getItem('gisungUser');
          if (saved) {
            const { userObj, isAdminSaved, contractsSaved, siteListSaved, userListSaved } = JSON.parse(saved);
            setCurrentUser(userObj);
            setIsAdmin(isAdminSaved || false);
            setContracts(contractsSaved || {});
            setDbSiteList(siteListSaved || []);
            setDbUserList(userListSaved || []);
            setIsLoggedIn(true);
          }
        } catch (e) {
          localStorage.removeItem('gisungUser');
        }
      }, []);

      // ---- DB정보에서 추출한 현장 목록 + 전체 행 ----
      const [dbSiteList, setDbSiteList] = useState([]);
      const [dbUserList, setDbUserList] = useState([]);

      // ---- 앱 상태 ----
      const [activeTab,         setActiveTab]         = useState('statements');
      const [isAdmin,           setIsAdmin]           = useState(false);
      const [isPwdModalOpen,    setIsPwdModalOpen]    = useState(false);
      const [pwdInput,          setPwdInput]          = useState('');
      const [contracts,         setContracts]         = useState({});
      const [isChangePwdOpen,   setIsChangePwdOpen]   = useState(false);

      // ---- 공유 데이터 상태 ----
      const [statements,   setStatements]   = useState([]);
      const [isLoading,    setIsLoading]    = useState(false);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [loadError,    setLoadError]    = useState(null);
      const [lastUpdated,  setLastUpdated]  = useState(null);

      // ==========================================
      // 로그인: DB정보 시트 조회 → ID/비밀번호 대조
      // - ID === 'master' 이면 관리자(isAdmin) 자동 부여
      // - DB정보의 현장명 목록(공란 제외)을 dbSiteList에 저장
      // - 로그인 유저의 계약금액을 contracts에 즉시 반영
      // ==========================================
      const handleLogin = async (id, password) => {
        setIsLoginLoading(true);
        setLoginError(null);

        try {
          const res = await fetchWithTimeout(DB_SHEETS_URL, { method: 'GET' });
          if (!res.ok) throw new Error(`HTTP ${res.status} — DB 시트에 접근할 수 없습니다. 시트 공유 설정을 확인하세요.`);

          const text  = await res.text();
          const users = parseGSheetResponse(text, DB_COL_NAMES);
          console.log('[login] DB 계정 수:', users.length);

          // ID·비밀번호 대조
          const matched = users.find(u =>
            String(u['ID'] ?? '').trim() === id &&
            String(u['비밀번호'] ?? '').trim() === password
          );
          if (!matched) throw new Error('아이디 또는 비밀번호가 일치하지 않습니다.');

          // 현장명·ID 둘 다 있는 유효한 행만 (보안설정 탭 표시용)
          const validUsers = users.filter(u =>
            String(u['현장명'] ?? '').trim() && String(u['ID'] ?? '').trim()
          );
          setDbUserList(validUsers);

          // 현장 목록: 현장명이 있는 행만, 순서 유지, 중복 제거
          const siteNames = [];
          const seen = new Set();
          validUsers.forEach(u => {
            const name = String(u['현장명'] ?? '').trim();
            if (name && !seen.has(name)) { seen.add(name); siteNames.push(name); }
          });
          setDbSiteList(siteNames);

          // 사용자 객체 구성
          const userObj = {
            id:             String(matched['ID']).trim(),
            name:           String(matched['ID']).trim(),
            email:          String(matched['ID']).trim(), // 내 기록 식별자
            password:       password,                    // 비밀번호 변경 시 사용
            siteName:       String(matched['현장명'] ?? '').trim(),
            company:        String(matched['회사'] ?? '').trim(),
            role:           String(matched['회사'] ?? '').trim(),
            contractAmount: parseAmount(matched['계약금액'])
          };
          console.log('[login] 성공:', userObj.id, '/', userObj.siteName);

          // DB 계약금액 즉시 반영
          const initContracts = {};
          users.forEach(u => {
            const site = String(u['현장명'] ?? '').trim();
            const amt  = parseAmount(u['계약금액']);
            if (site && amt > 0) initContracts[site] = amt;
          });
          setContracts(initContracts);

          // master → 관리자 자동 부여
          const isMaster = userObj.id === 'master';
          if (isMaster) setIsAdmin(true);

          setCurrentUser(userObj);
          setIsLoggedIn(true);

          // 세션 localStorage 저장 (F5 새로고침 대비)
          localStorage.setItem('gisungUser', JSON.stringify({
            userObj,
            isAdminSaved:    isMaster,
            contractsSaved:  initContracts,
            siteListSaved:   siteNames,
            userListSaved:   validUsers
          }));

        } catch (e) {
          console.error('[login] 실패:', e.message);
          setLoginError(e.message);
        } finally {
          setIsLoginLoading(false);
        }
      };

      // ==========================================
      // DB정보 새로고침 (보안설정 탭 "새로고침" 버튼용)
      // ==========================================
      const refreshDbData = useCallback(async () => {
        try {
          // 캐시버스팅: 매번 신선한 응답을 받기 위해 타임스탬프 파라미터 추가
          const url = DB_SHEETS_URL + `&_=${Date.now()}`;
          const res = await fetchWithTimeout(url, {
            method: 'GET',
            headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text  = await res.text();
          const users = parseGSheetResponse(text, DB_COL_NAMES);
          // 현장명과 ID가 모두 있는 유효한 행만 저장
          const validUsers = users.filter(u =>
            String(u['현장명'] ?? '').trim() && String(u['ID'] ?? '').trim()
          );
          setDbUserList(validUsers);
          const siteNames = [];
          const seen = new Set();
          validUsers.forEach(u => {
            const name = String(u['현장명'] ?? '').trim();
            if (name && !seen.has(name)) { seen.add(name); siteNames.push(name); }
          });
          setDbSiteList(siteNames);
        } catch (e) {
          console.error('[refreshDb] 실패:', e.message);
          throw e; // SecurityTab의 isRefreshing 해제를 위해 re-throw
        }
      }, []);

      // ==========================================
      // 로그아웃: 모든 상태 초기화
      // ==========================================
      const handleLogout = () => {
        localStorage.removeItem('gisungUser');
        setIsLoggedIn(false);
        setCurrentUser(null);
        setDbSiteList([]);
        setStatements([]);
        setContracts({});
        setActiveTab('statements');
        setIsAdmin(false);
        setLoadError(null);
        setLastUpdated(null);
        setLoginError(null);
      };

      // ==========================================
      // 기성리스트 데이터 로드
      // ==========================================
      const loadData = useCallback(async (isManualRefresh = false) => {
        if (isManualRefresh) setIsRefreshing(true);
        else setIsLoading(true);
        setLoadError(null);

        try {
