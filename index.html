          const res = await fetchWithTimeout(SHEETS_URL, { method: 'GET' });
          if (!res.ok) throw new Error(`HTTP ${res.status} — Google Sheets 접근 실패.`);

          const text       = await res.text();
          const dataWithIds = parseGSheetResponse(text, COL_NAMES);
          console.log('[loadData] 파싱된 행 수:', dataWithIds.length);

          setStatements(dataWithIds);
          setLastUpdated(new Date());

          // 기성리스트의 계약금액 병합 (DB정보 값이 prev에 있으면 DB값 우선 유지)
          const loadedContracts = {};
          dataWithIds.forEach(item => {
            if (item.현장명 && item.계약금액) {
              loadedContracts[item.현장명] = parseAmount(item.계약금액);
            }
          });
          setContracts(prev => ({ ...loadedContracts, ...prev }));

        } catch (e) {
          console.error('[loadData] 실패:', e.message);
          setLoadError(e.message);
        } finally {
          setIsLoading(false);
          setIsRefreshing(false);
        }
      }, []);

      // 로그인 성공 후 자동 로드
      useEffect(() => {
        if (isLoggedIn) loadData(false);
      }, [isLoggedIn, loadData]);

      // ==========================================
      // 로그인 전: 로그인 화면
      // ==========================================
      if (!isLoggedIn) {
        return <LoginScreen onLogin={handleLogin} isLoading={isLoginLoading} error={loginError} />;
      }

      // ==========================================
      // 로그인 후: 메인 앱
      // ==========================================
      const isMasterUser = currentUser.id === 'master';

      return (
        <div className="max-w-3xl mx-auto p-4 sm:p-6 pb-20">

          {/* 헤더 */}
          <header className="flex justify-between items-center mb-6 bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
            <div className="flex items-center gap-3">
              <img src="icon.png" alt="SAMJIN Hub" className="w-11 h-11 rounded-xl object-cover shadow-sm flex-shrink-0" />
              <div>
                <h1 className="text-lg font-extrabold text-gray-900 tracking-tight leading-tight">SAMJIN Hub</h1>
                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">SAMJIN Hub v2.6</p>
              </div>
            </div>
            <div className="text-right">
              <p className="text-sm font-bold text-gray-800">
                {isMasterUser ? '전체 현장 관리' : currentUser.siteName || '현장 미지정'}
              </p>
              <div className="flex items-center justify-end gap-1 mt-0.5">
                {isMasterUser && (
                  <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold">관리자</span>
                )}
                <p className="text-[11px] text-blue-600 font-bold bg-blue-50 inline-block px-2 py-0.5 rounded">
                  {currentUser.id}{currentUser.company ? ` · ${currentUser.company}` : ''}
                </p>
              </div>
              <div className="flex items-center justify-end gap-2 mt-1">
                <button onClick={() => setIsChangePwdOpen(true)}
                  className="flex items-center gap-0.5 text-[10px] text-gray-400 hover:text-blue-500 transition-colors">
                  <span className="material-symbols-outlined" style={{fontSize:'13px'}}>key</span>
                  비밀번호 변경
                </button>
                <span className="text-gray-300 text-[10px]">|</span>
                <button onClick={handleLogout}
                  className="flex items-center gap-0.5 text-[10px] text-gray-400 hover:text-red-500 transition-colors">
                  <span className="material-symbols-outlined" style={{fontSize:'13px'}}>logout</span>
                  로그아웃
                </button>
              </div>
            </div>
          </header>

          {/* 탭 */}
          <div className="flex space-x-1.5 bg-gray-200/70 p-1.5 rounded-xl mb-6 w-full max-w-lg mx-auto sm:mx-0">
            <button onClick={() => setActiveTab('statements')}
              className={`flex-1 py-2 text-[12px] font-bold rounded-lg transition-all flex justify-center items-center gap-1 ${activeTab === 'statements' ? 'bg-white text-blue-600 shadow' : 'text-gray-500 hover:text-gray-800'}`}>
              <span className="material-symbols-outlined" style={{fontSize:'16px'}}>receipt_long</span>
              기성내역서
            </button>
            <button onClick={() => setActiveTab('monthly')}
              className={`flex-1 py-2 text-[12px] font-bold rounded-lg transition-all flex justify-center items-center gap-1 ${activeTab === 'monthly' ? 'bg-white text-blue-600 shadow' : 'text-gray-500 hover:text-gray-800'}`}>
              <span className="material-symbols-outlined" style={{fontSize:'16px'}}>calendar_month</span>
              월별현황
            </button>
            <button onClick={() => setActiveTab('security')}
              className={`flex-1 py-2 text-[12px] font-bold rounded-lg transition-all flex justify-center items-center gap-1 ${activeTab === 'security' ? 'bg-white text-blue-600 shadow' : 'text-gray-500 hover:text-gray-800'}`}>
              <span className="material-symbols-outlined" style={{fontSize:'16px'}}>lock</span>
              보안설정
            </button>
          </div>

          <main>
            {activeTab === 'statements' && (
              <StatementsTab
                statements={statements}
                isLoading={isLoading}
                isRefreshing={isRefreshing}
                loadError={loadError}
                lastUpdated={lastUpdated}
                loadData={loadData}
                currentUser={currentUser}
                contracts={contracts}
                setContracts={setContracts}
                isAdmin={isAdmin}
                setIsAdmin={setIsAdmin}
                setIsPwdModalOpen={setIsPwdModalOpen}
              />
            )}
            {activeTab === 'monthly' && (
              <MonthlyTab
                statements={statements}
                isLoading={isLoading}
                loadError={loadError}
                isAdmin={isAdmin}
                setIsPwdModalOpen={setIsPwdModalOpen}
                siteList={dbSiteList}
                currentUser={currentUser}
              />
            )}
            {activeTab === 'security' && (
              <SecurityTab
                contracts={contracts}
                setContracts={setContracts}
                isAdmin={isAdmin}
                setIsPwdModalOpen={setIsPwdModalOpen}
                siteList={dbSiteList}
                dbUserList={dbUserList}
                onRefreshDb={refreshDbData}
              />
            )}
          </main>

          {/* 비밀번호 변경 모달 */}
          {isChangePwdOpen && (
            <ChangePwdModal
              currentUser={currentUser}
              onClose={() => setIsChangePwdOpen(false)}
              onSuccess={(newPwd) => {
                // 변경 성공 시 메모리 상의 비밀번호도 갱신
                setCurrentUser(prev => ({ ...prev, password: newPwd }));
                setIsChangePwdOpen(false);
              }}
            />
          )}

          {/* 관리자 인증 모달 */}
          {isPwdModalOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-2xl p-6 max-w-xs w-full shadow-2xl border border-gray-100">
                <div className="flex items-center gap-2 mb-4">
                  <span className="material-symbols-outlined text-blue-600">admin_panel_settings</span>
                  <h3 className="font-bold text-gray-800">관리자 인증</h3>
                </div>
                <p className="text-xs text-gray-500 mb-3">관리자 비밀번호를 입력하면 모든 현장의 금액을 확인할 수 있습니다.</p>
                <input type="password" value={pwdInput}
                  onChange={e => setPwdInput(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      if (pwdInput === 'admin123') { setIsAdmin(true); setIsPwdModalOpen(false); setPwdInput(''); }
                      else alert('비밀번호가 틀렸습니다.');
                    }
                  }}
                  placeholder="관리자 비밀번호"
                  className="w-full border border-gray-300 p-2.5 rounded-lg mb-5 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                  autoFocus />
                <div className="flex gap-2">
                  <button onClick={() => { setIsPwdModalOpen(false); setPwdInput(''); }}
                    className="flex-1 py-2.5 bg-gray-100 text-gray-700 font-bold rounded-lg text-sm hover:bg-gray-200 transition-colors">
                    취소
                  </button>
                  <button onClick={() => {
                    if (pwdInput === 'admin123') { setIsAdmin(true); setIsPwdModalOpen(false); setPwdInput(''); }
                    else alert('비밀번호가 틀렸습니다.');
                  }} className="flex-1 py-2.5 bg-blue-600 text-white font-bold rounded-lg text-sm shadow-md hover:bg-blue-700 transition-colors">
                    인증 확인
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
