<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현장 소통 허브 - 상세 기성 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; display: inline-block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ==========================================
    // 웹훅 주소 (n8n) — 등록·수정 전송 전용
    // ==========================================
    const WEBHOOK_LOAD_URL = 'https://158.179.174.86.sslip.io/webhook-test/795acae9-62b5-4ba0-b0ce-a80f9e3a5d88';
    const WEBHOOK_EDIT_URL = 'https://158.179.174.86.sslip.io/webhook-test/0d46d84b-8a63-4c11-9536-bb50c5e34a5f';

    // ==========================================
    // Google Sheets 직접 조회 설정
    // 시트가 "링크가 있는 모든 사용자 - 뷰어" 로 공유되어 있어야 합니다.
    // ==========================================
    const SHEET_ID   = '1K3X7vKsm21Bt9kIro8JpYcZmBU03nT7l5ipgsU6JAw4';
    const SHEET_NAME = '기성리스트';
    const SHEETS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=1`;
    // A열~O열 순서대로 컬럼명
    const COL_NAMES  = ['이름','직책','이메일','현장명','연도','월','회차','공종','계약금액','전회기성','금회기성','누계기성','잔여금액','기성률','업데이트'];

    // ==========================================
    // 유틸리티 함수
    // ==========================================

    // Google Sheets 에서 돌아오는 값이 number / "1,000,000" / "1000000" 혼재 → 통합 변환
    const parseAmount = (val) => {
      if (val === null || val === undefined || val === '') return 0;
      if (typeof val === 'number') return Math.floor(val);
      return parseInt(String(val).replace(/[^0-9]/g, ''), 10) || 0;
    };

    // n8n 응답은 설정에 따라 포맷이 다름 → 배열로 정규화
    //  ① [{...}, ...]             — 일반 배열 (Respond to Webhook "All Entries JSON")
    //  ② [{ json:{...} }, ...]    — n8n 내부 포맷
    //  ③ { data:[...] }           — 래핑 객체
    //  ④ { ... }                  — 단일 행 (결과 1개)
    const parseN8nResponse = (text) => {
      if (!text || !text.trim()) return [];
      let parsed;
      try { parsed = JSON.parse(text); } catch (e) {
        console.warn('[parseN8nResponse] JSON 파싱 실패. 원본:', text.slice(0, 300));
        return [];
      }
      // ② n8n 내부 포맷
      if (Array.isArray(parsed) && parsed.length > 0 && parsed[0] && typeof parsed[0].json === 'object') {
        console.log('[parseN8nResponse] n8n 내부 포맷 → json 언래핑');
        return parsed.map(item => item.json);
      }
      // ① 일반 배열
      if (Array.isArray(parsed)) return parsed;
      // ③ 래핑 객체
      if (Array.isArray(parsed?.data))  return parsed.data;
      if (Array.isArray(parsed?.rows))  return parsed.rows;
      if (Array.isArray(parsed?.items)) return parsed.items;
      // ④ 단일 객체
      if (parsed && typeof parsed === 'object') return [parsed];
      return [];
    };

    // fetch + 5xx / 네트워크 오류 재시도 (4xx는 즉시 에러)
    // ==========================================
    // Google Sheets gviz/tq 응답 파서
    // ==========================================
    const parseGSheetResponse = (text) => {
      // JSONP 래퍼 제거: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
      if (!match) throw new Error('Google Sheets 응답 형식을 파싱하지 못했습니다. 시트 공유 설정을 확인하세요.');
      const json = JSON.parse(match[1]);
      if (json.status !== 'ok') {
        const msg = json.errors?.[0]?.detailed_message || json.errors?.[0]?.message || '알 수 없는 오류';
        throw new Error(`Google Sheets 오류: ${msg}`);
      }
      const cols = json.table?.cols || [];
      const rows = json.table?.rows || [];
      return rows
        .filter(row => row.c && row.c.some(cell => cell?.v != null))
        .map((row, idx) => {
          const obj = { _rowIndex: idx + 2 }; // 1행=헤더, 데이터는 2행부터
          cols.forEach((col, ci) => {
            const key = COL_NAMES[ci] || col.label || col.id;
            obj[key] = row.c?.[ci]?.v ?? '';
          });
          return obj;
        });
    };

    const fetchWithTimeout = async (url, options, timeoutMs = 15000) => {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timer);
        return res;
      } catch (e) {
        clearTimeout(timer);
        if (e.name === 'AbortError') throw new Error('요청 시간 초과 (15초). n8n 워크플로우가 활성 상태인지 확인하세요.');
        throw e;
      }
    };

    const numberToKorean = (num) => {
      if (!num || isNaN(num)) return '';
      const units = ['', '만', '억', '조'];
      let res = '';
      let n = Math.floor(num);
      for (let i = 0; n > 0 && i < units.length; i++) {
        let chunk = n % 10000;
        if (chunk > 0) res = chunk.toLocaleString() + units[i] + ' ' + res;
        n = Math.floor(n / 10000);
      }
      return res.trim() + ' 원';
    };

    const ProgressCircle = ({ percent, size = 40 }) => {
      const radius = size * 0.4;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (percent / 100) * circumference;
      return (
        <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
          <svg width={size} height={size}>
            <circle className="text-gray-200" strokeWidth="4" stroke="currentColor" fill="transparent" r={radius} cx={size/2} cy={size/2} />
            <circle className="text-blue-600 progress-ring__circle" strokeWidth="4" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" stroke="currentColor" fill="transparent" r={radius} cx={size/2} cy={size/2} />
          </svg>
          <span className="absolute text-[9px] font-bold">{Math.round(percent)}%</span>
        </div>
      );
    };

    const SITE_LIST = [
      '모아 평택고덕', '미추1구역', '중흥 경기송정', '제일 고양장항', '제일 인천계양',
      '제일 원하도급율적용', '삼진 최초견적', '라인 파주운정', '라인 충북혁신',
      '라인 대덕구 신청사', '인천 송도(RM5BL) 공동주택', '양주역 3차',
      '영무 아양지구', '영무 군산일곡근린', '안성당왕 영무',
      '함평미르채센텀 주상복합', '화성 동탄', '유탑 강릉'
    ];

    // ==========================================
    // 1. 보안설정 (관리자 전용) 컴포넌트
    // ==========================================
    const SecurityTab = ({ contracts, setContracts, isAdmin, setIsPwdModalOpen }) => {
      const [selectedSite, setSelectedSite] = useState(SITE_LIST[0]);
      const [inputAmount, setInputAmount] = useState('');
      const [successMsg, setSuccessMsg] = useState('');

      useEffect(() => {
        const currentSaved = contracts[selectedSite];
        setInputAmount(currentSaved ? currentSaved.toLocaleString() : '');
        setSuccessMsg('');
      }, [selectedSite, contracts]);

      if (!isAdmin) {
        return (
          <div className="flex flex-col items-center justify-center p-12 bg-white rounded-xl border border-gray-200 shadow-sm">
            <span className="material-symbols-outlined text-5xl text-gray-300 mb-4">lock</span>
            <h2 className="text-xl font-bold text-gray-800 mb-2">보안 설정 접근 제한</h2>
            <p className="text-sm text-gray-500 mb-6 text-center">이 탭은 현장별 전체 금액을 설정하는 곳으로,<br/>관리자 권한이 필요합니다.</p>
            <button onClick={() => setIsPwdModalOpen(true)} className="px-6 py-2.5 bg-gray-900 text-white font-bold rounded-lg hover:bg-black transition-colors">
              관리자 인증하기
            </button>
          </div>
        );
      }

      const handleSave = (e) => {
        e.preventDefault();
        const numericAmount = parseInt(inputAmount.replace(/,/g, '')) || 0;
        setContracts(prev => ({ ...prev, [selectedSite]: numericAmount }));
        setSuccessMsg('✅ 현장 전체 계약금액이 저장되었습니다.');
        setTimeout(() => setSuccessMsg(''), 3000);
      };

      return (
        <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm animate-fade-in">
          <div className="flex items-center gap-2 mb-6 border-b pb-4">
            <span className="material-symbols-outlined text-blue-600">admin_panel_settings</span>
            <h2 className="text-lg font-bold text-gray-800">현장별 계약금액 설정 (관리자)</h2>
          </div>
          <form onSubmit={handleSave} className="space-y-5 max-w-sm">
            <div>
              <label className="block text-xs font-bold text-gray-600 mb-1">설정할 현장 선택</label>
              <select value={selectedSite} onChange={(e) => setSelectedSite(e.target.value)}
                className="w-full border border-gray-300 p-2.5 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                {SITE_LIST.map(site => <option key={site} value={site}>{site}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-bold text-gray-600 mb-1">현장 전체 계약금액 (원)</label>
              <input type="text" value={inputAmount}
                onChange={(e) => setInputAmount(e.target.value.replace(/\D/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ","))}
                placeholder="예: 10,000,000,000"
                className="w-full border border-gray-300 p-2.5 rounded-lg text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none" required />
              <div className="mt-1 text-[11px] text-gray-500 font-medium h-4">
                {inputAmount && numberToKorean(parseInt(inputAmount.replace(/,/g, '')))}
              </div>
            </div>
            {successMsg && <div className="text-xs font-bold text-green-600 bg-green-50 p-2 rounded">{successMsg}</div>}
            <button type="submit" className="w-full py-2.5 bg-blue-600 text-white font-bold rounded-lg shadow hover:bg-blue-700 transition-colors">
              저장하기
            </button>
          </form>
        </div>
      );
    };

    // ==========================================
    // 2. 기성내역서 탭 컴포넌트
    // ==========================================
    const StatementsTab = ({ currentUser, contracts, setContracts, isAdmin, setIsAdmin, setIsPwdModalOpen }) => {
      const [statements, setStatements]     = useState([]);
      const [isFormModalOpen, setIsFormModalOpen] = useState(false);
      const [isLoading, setIsLoading]       = useState(true);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [loadError, setLoadError]       = useState(null);
      const [editingRowIndex, setEditingRowIndex] = useState(null);
      const [errorMsg, setErrorMsg]         = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [lastUpdated, setLastUpdated]   = useState(null);

      const [newForm, setNewForm] = useState({
        year: String(new Date().getFullYear()),
        month: String(new Date().getMonth() + 1),
        round: '1', category: '기계', amount: '', prevAmount: ''
      });

      // =====================================================================
      // 데이터 로드 —  페이지 진입 시 1회 + 새로고침 버튼 클릭 시 실행
      // =====================================================================
      const loadData = useCallback(async (isManualRefresh = false) => {
        if (isManualRefresh) setIsRefreshing(true);
        else setIsLoading(true);
        setLoadError(null);

        try {
          // Google Sheets gviz/tq API 로 직접 조회 (n8n 불필요)
          // 시트가 "링크가 있는 모든 사용자 - 뷰어" 공유 설정이어야 합니다.
          const res = await fetchWithTimeout(SHEETS_URL, { method: 'GET' });

          if (!res.ok) {
            throw new Error(`HTTP ${res.status} — Google Sheets 접근 실패. 시트가 공개(링크로 볼 수 있음)로 설정되어 있는지 확인하세요.`);
          }

          const text = await res.text();
          console.log('[loadData] Google Sheets 응답 (앞 300자):', text.slice(0, 300));

          const dataWithIds = parseGSheetResponse(text);
          console.log('[loadData] 파싱된 행 수:', dataWithIds.length, '/ 첫 행 샘플:', dataWithIds[0]);

          setStatements(dataWithIds);
          setLastUpdated(new Date());

          // 시트 데이터에서 현장별 계약금액 초기 세팅
          const loadedContracts = {};
          dataWithIds.forEach(item => {
            if (item.현장명 && item.계약금액) {
              loadedContracts[item.현장명] = parseAmount(item.계약금액);
            }
          });
          // 로컬(관리자)이 이미 설정한 값은 유지, 없는 현장만 시트 값 사용
          setContracts(prev => ({ ...loadedContracts, ...prev }));

        } catch (e) {
          console.error('[loadData] 실패:', e.message);
          setLoadError(e.message);
        } finally {
          setIsLoading(false);
          setIsRefreshing(false);
        }
      }, [setContracts]);

      // 페이지 진입 시 1회 자동 로드
      useEffect(() => { loadData(false); }, [loadData]);

      // =====================================================================
      // 폼 제출 — 등록(submit) / 수정(edit)
      // =====================================================================
      const handleFormSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        setErrorMsg(null);

        const isEditing    = editingRowIndex !== null;
        const url          = isEditing ? WEBHOOK_EDIT_URL : WEBHOOK_LOAD_URL;
        const curAmount    = parseAmount(newForm.amount);
        const prevAmount   = parseAmount(newForm.prevAmount);
        const totalContract = contracts[currentUser.siteName] || 0;
        const cumulative   = prevAmount + curAmount;
        const remaining    = totalContract - cumulative;
        const rate         = totalContract > 0 ? (cumulative / totalContract) * 100 : 0;

        const payload = {
          action: isEditing ? 'edit' : 'submit',
          ...(isEditing && { rowIndex: editingRowIndex }),
          data: {
            이름:     currentUser.name,
            직책:     currentUser.role,
            이메일:   currentUser.email,
            연도:     newForm.year,
            월:       newForm.month,
            회차:     newForm.round,
            현장명:   currentUser.siteName,
            공종:     newForm.category,
            계약금액: totalContract,
            전회기성: prevAmount,
            금회기성: curAmount,
            누계기성: cumulative,
            잔여금액: remaining,
            기성률:   parseFloat(rate.toFixed(2)),
            업데이트: new Date().toISOString().split('T')[0]
          }
        };

        console.log('[submit] 전송 URL:', url);
        console.log('[submit] 페이로드:', JSON.stringify(payload, null, 2));

        try {
          const res = await fetchWithTimeout(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/plain, */*' },
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
            const errText = await res.text().catch(() => '');
            throw new Error(`HTTP ${res.status}${errText ? ' — ' + errText.slice(0, 120) : ''}`);
          }

          const responseText = await res.text();
          console.log('[submit] 응답:', responseText.slice(0, 300));

          // 성공 → 모달 닫기 → 데이터 새로고침
          setIsFormModalOpen(false);
          setEditingRowIndex(null);
          setNewForm({
            year: String(new Date().getFullYear()),
            month: String(new Date().getMonth() + 1),
            round: '1', category: '기계', amount: '', prevAmount: ''
          });
          await loadData(true); // 새 데이터 즉시 반영

        } catch (e) {
          console.error('[submit] 오류:', e.message);
          const isNetworkError = e.message.includes('Failed to fetch')
            || e.message.includes('NetworkError')
            || e.message.includes('시간 초과');
          if (isNetworkError) {
            setErrorMsg({
              title: '서버 연결 실패',
              desc: 'n8n 워크플로우가 "테스트 실행" 중인지 확인하거나, 브라우저 보안 차단을 해제해주세요.',
              link: url
            });
          } else {
            setErrorMsg({ title: '저장 실패', desc: e.message });
          }
        } finally {
          setIsSubmitting(false);
        }
      };

      const formatPrice = (val) => {
        const num = parseAmount(val);
        return isAdmin ? `₩${num.toLocaleString()}` : '₩**,***,***';
      };

      const lastUpdatedStr = lastUpdated
        ? lastUpdated.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        : null;

      // =====================================================================
      // 렌더
      // =====================================================================
      return (
        <div className="space-y-4">

          {/* 헤더 바 */}
          <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <div>
              <h2 className="font-bold flex items-center gap-2 text-gray-800">
                <span className="material-symbols-outlined text-blue-600">database</span>
                기성 리스트 내역
              </h2>
              {lastUpdatedStr && !isLoading && (
                <p className="text-[10px] text-gray-400 mt-0.5 ml-7">마지막 업데이트: {lastUpdatedStr}</p>
              )}
            </div>

            <div className="flex gap-2 items-center">
              {/* 금액 잠금/잠금해제 */}
              <button
                onClick={() => isAdmin ? setIsAdmin(false) : setIsPwdModalOpen(true)}
                className="px-3 py-2 text-sm border border-gray-300 rounded-lg flex items-center gap-1 hover:bg-gray-50 transition-colors"
              >
                <span className="material-symbols-outlined" style={{fontSize:'16px'}}>{isAdmin ? 'lock_open' : 'lock'}</span>
                {isAdmin ? '금액 숨기기' : '금액 확인'}
              </button>

              {/* 새로고침 버튼 */}
              <button
                onClick={() => loadData(true)}
                disabled={isRefreshing || isLoading}
                title="구글 시트에서 최신 데이터 불러오기"
                className="px-3 py-2 text-sm border border-gray-300 rounded-lg flex items-center gap-1 hover:bg-gray-50 transition-colors disabled:opacity-40"
              >
                <span className={`material-symbols-outlined ${isRefreshing ? 'animate-spin' : ''}`} style={{fontSize:'16px'}}>refresh</span>
                {isRefreshing ? '로딩...' : '새로고침'}
              </button>

              {/* 새 기성 등록 */}
              <button
                onClick={() => {
                  setEditingRowIndex(null);
                  setNewForm({
                    year: String(new Date().getFullYear()),
                    month: String(new Date().getMonth() + 1),
                    round: '1', category: '기계', amount: '', prevAmount: ''
                  });
                  setErrorMsg(null);
                  setIsFormModalOpen(true);
                }}
                className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold shadow hover:bg-blue-700 transition-colors"
              >
                + 새 기성 등록
              </button>
            </div>
          </div>

          {/* 오류 배너 */}
          {loadError && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 animate-fade-in">
              <div className="flex items-start gap-3">
                <span className="material-symbols-outlined text-amber-500 mt-0.5" style={{fontSize:'20px'}}>warning</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-bold text-amber-800">Google Sheets 데이터를 불러오지 못했습니다</p>
                  <p className="text-xs text-amber-700 mt-1 break-all">{loadError}</p>
                  <div className="mt-2 flex gap-3 flex-wrap text-xs font-bold text-amber-800">
                    <button onClick={() => loadData(true)} className="underline hover:text-amber-600 flex items-center gap-1">
                      <span className="material-symbols-outlined" style={{fontSize:'13px'}}>refresh</span> 다시 시도
                    </button>
                    <a href={`https://docs.google.com/spreadsheets/d/${SHEET_ID}`} target="_blank" rel="noreferrer" className="underline hover:text-amber-600 flex items-center gap-1">
                      <span className="material-symbols-outlined" style={{fontSize:'13px'}}>open_in_new</span> 시트 공유 설정 확인
                    </a>
                  </div>
                </div>
              </div>
              <div className="mt-3 bg-amber-100/60 rounded-lg p-3 text-[11px] text-amber-800 space-y-1">
                <p className="font-bold">📌 해결 방법 체크리스트</p>
                <p>① 구글 시트 우측 상단 <b>"공유"</b> 클릭</p>
                <p>② <b>"링크가 있는 모든 사용자"</b> → <b>"뷰어"</b> 로 설정 후 저장</p>
                <p>③ 시트명이 정확히 <b>"{SHEET_NAME}"</b> 인지 확인</p>
              </div>
            </div>
          )}

          {/* 목록 */}
          <div className="grid gap-3">
            {isLoading ? (
              <div className="text-center p-14 text-gray-400 font-medium flex flex-col items-center gap-3">
                <span className="material-symbols-outlined animate-spin text-4xl text-blue-400">sync</span>
                <span>구글 시트에서 데이터를 불러오는 중...</span>
                <span className="text-[11px]">시트: {SHEET_NAME}</span>
              </div>
            ) : statements.length === 0 ? (
              <div className="text-center p-10 text-gray-400 text-sm bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col items-center gap-2">
                <span className="material-symbols-outlined text-3xl text-gray-300">inbox</span>
                {loadError ? '오류로 인해 데이터를 표시할 수 없습니다.' : '등록된 기성 내역이 없습니다.'}
              </div>
            ) : (
              statements.map((s, idx) => (
                <div key={s._rowIndex ?? idx} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between hover:border-blue-400 transition-all animate-fade-in">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                      <span className="text-xs font-bold px-2 py-0.5 bg-gray-100 border border-gray-200 rounded text-gray-700 shrink-0">{s.공종}</span>
                      <h3 className="font-bold text-gray-900 truncate">{s.연도}년 {s.월}월 {s.회차}회차 — {s.현장명}</h3>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-y-1 text-[11px] text-gray-500">
                      <div>계약: <span className="text-gray-900 font-medium">{formatPrice(s.계약금액)}</span></div>
                      <div>금회: <span className="text-blue-600 font-bold">{formatPrice(s.금회기성)}</span></div>
                      <div>누계: <span className="text-gray-900 font-medium">{formatPrice(s.누계기성)}</span></div>
                      <div>잔여: <span className="text-red-500 font-medium">{formatPrice(s.잔여금액)}</span></div>
                    </div>
                    <div className="mt-2 text-[10px] text-gray-400">
                      업데이트: {s.업데이트} | {s.이메일} | {s.이름} ({s.직책})
                    </div>
                  </div>
                  <div className="flex items-center gap-3 ml-4 border-l pl-4 border-gray-100 shrink-0">
                    <ProgressCircle percent={parseFloat(s.기성률 || 0)} />
                    {s.이메일 === currentUser.email && (
                      <button
                        onClick={() => {
                          setEditingRowIndex(s._rowIndex ?? idx + 2);
                          setNewForm({
                            year:     String(s.연도  || new Date().getFullYear()),
                            month:    String(s.월    || 1),
                            round:    String(s.회차  || 1),
                            category: s.공종 || '기계',
                            amount:   parseAmount(s.금회기성) > 0 ? parseAmount(s.금회기성).toLocaleString() : '',
                            prevAmount: parseAmount(s.전회기성) > 0 ? parseAmount(s.전회기성).toLocaleString() : ''
                          });
                          setErrorMsg(null);
                          setIsFormModalOpen(true);
                        }}
                        className="text-gray-400 hover:text-blue-600 transition-colors p-1"
                      >
                        <span className="material-symbols-outlined">edit_note</span>
                      </button>
                    )}
                  </div>
                </div>
              ))
            )}
          </div>

          {/* 등록 / 수정 모달 */}
          {isFormModalOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 overflow-y-auto backdrop-blur-sm">
              <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl my-auto animate-fade-in border border-gray-100">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <span className="material-symbols-outlined text-blue-600">
                      {editingRowIndex !== null ? 'edit_document' : 'post_add'}
                    </span>
                    {editingRowIndex !== null ? '기성 정보 수정' : '새 기성 정보 등록'}
                  </h3>
                  <button onClick={() => { setIsFormModalOpen(false); setEditingRowIndex(null); }}
                    className="text-gray-400 hover:text-gray-800 transition-colors">
                    <span className="material-symbols-outlined">close</span>
                  </button>
                </div>

                <form onSubmit={handleFormSubmit} className="space-y-5">

                  {/* 년도 / 월 / 회차 */}
                  <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <div className="flex items-center justify-center gap-2 mb-3">
                      <span className="material-symbols-outlined text-gray-500" style={{fontSize:'18px'}}>calendar_month</span>
                      <span className="text-sm font-bold text-gray-700">청구 년월 및 회차 지정</span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <div className="text-center">
                        <label className="block text-[10px] text-gray-500 mb-1 font-medium">년도</label>
                        <input type="number" value={newForm.year}
                          onChange={e => setNewForm({...newForm, year: e.target.value})}
                          className="w-full border border-gray-300 p-2 rounded-lg text-sm text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" required />
                      </div>
                      <div className="text-center">
                        <label className="block text-[10px] text-gray-500 mb-1 font-medium">월</label>
                        <select value={newForm.month}
                          onChange={e => setNewForm({...newForm, month: e.target.value})}
                          className="w-full border border-gray-300 p-2 rounded-lg text-sm text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                          {[...Array(12)].map((_, i) => <option key={i+1} value={i+1}>{i+1}월</option>)}
                        </select>
                      </div>
                      <div className="text-center">
                        <label className="block text-[10px] text-gray-500 mb-1 font-medium">회차</label>
                        <div className="relative">
                          <input type="number" value={newForm.round}
                            onChange={e => setNewForm({...newForm, round: e.target.value})}
                            className="w-full border border-gray-300 p-2 pr-6 rounded-lg text-sm text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" required />
                          <span className="absolute right-2 top-2.5 text-xs text-gray-500 font-bold">회</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 공종 */}
                  <div>
                    <label className="block text-[11px] font-bold text-gray-600 mb-1">공종 (카테고리)</label>
                    <select value={newForm.category}
                      onChange={e => setNewForm({...newForm, category: e.target.value})}
                      className="w-full border border-gray-300 p-2.5 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                      <option>기계</option><option>소방</option><option>소방(기계)</option><option>소방(전기)</option>
                    </select>
                  </div>

                  {/* 계약금액 (읽기 전용) */}
                  <div>
                    <label className="block text-[11px] font-bold text-gray-400 mb-1 flex justify-between">
                      <span>현장 전체 계약금액</span>
                      <span className="text-[9px] text-gray-400 font-normal">※ 보안설정 탭에서 변경 가능</span>
                    </label>
                    <input type="text" readOnly
                      value={contracts[currentUser.siteName]
                        ? contracts[currentUser.siteName].toLocaleString() + ' 원'
                        : '설정되지 않음'}
                      className="w-full border border-gray-200 p-2.5 rounded-lg text-sm font-bold bg-gray-100 text-gray-500 cursor-not-allowed outline-none" />
                  </div>

                  {/* 전회 / 금회 */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[11px] font-bold text-gray-600 mb-1">전회까지 누계기성</label>
                      <input type="text" placeholder="입력" value={newForm.prevAmount}
                        onChange={e => setNewForm({...newForm, prevAmount: e.target.value.replace(/\D/g,'').replace(/\B(?=(\d{3})+(?!\d))/g, ",")})}
                        className="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-blue-600 mb-1">금회 청구금액</label>
                      <input type="text" placeholder="입력" value={newForm.amount}
                        onChange={e => setNewForm({...newForm, amount: e.target.value.replace(/\D/g,'').replace(/\B(?=(\d{3})+(?!\d))/g, ",")})}
                        className="w-full border-2 border-blue-200 bg-blue-50/30 p-2.5 rounded-lg text-sm font-bold text-blue-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none" required />
                    </div>
                  </div>

                  {/* 한글 금액 미리보기 */}
                  <div className="bg-blue-50 p-3 rounded-lg border border-blue-100 flex items-center justify-between">
                    <span className="text-[11px] text-blue-500 font-bold">한글 금액 (금회)</span>
                    <span className="text-sm font-bold text-blue-800">
                      {numberToKorean(parseAmount(newForm.amount)) || '0 원'}
                    </span>
                  </div>

                  {/* 오류 메시지 */}
                  {errorMsg && (
                    <div className="bg-red-50 text-red-600 p-4 rounded-lg text-xs border border-red-100 flex flex-col gap-2 animate-fade-in">
                      <div className="font-bold flex items-center gap-1.5">
                        <span className="material-symbols-outlined" style={{fontSize:'18px'}}>error</span>
                        {errorMsg.title}
                      </div>
                      {errorMsg.desc && <div className="text-gray-700 ml-6 leading-relaxed">{errorMsg.desc}</div>}
                      {errorMsg.link && (
                        <a href={errorMsg.link} target="_blank" rel="noreferrer"
                          className="inline-flex items-center gap-1 text-blue-700 font-bold hover:underline bg-blue-100/50 w-fit px-3 py-1.5 rounded border border-blue-200 ml-6 mt-1">
                          <span className="material-symbols-outlined" style={{fontSize:'14px'}}>open_in_new</span>
                          보안 차단 해제하러 가기
                        </a>
                      )}
                    </div>
                  )}

                  {/* 제출 버튼 */}
                  <button type="submit" disabled={isSubmitting}
                    className="w-full py-3 mt-2 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition-all disabled:opacity-50 flex justify-center items-center gap-2">
                    {isSubmitting
                      ? <><span className="material-symbols-outlined animate-spin" style={{fontSize:'16px'}}>sync</span> 전송 중...</>
                      : editingRowIndex !== null ? '시트 정보 업데이트' : '기성 정보 등록 및 시트 전송'
                    }
                  </button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // 메인 앱 컨테이너
    // ==========================================
    const App = () => {
      const [user]     = useState({ name: '관리자', email: 'admin@test.com', siteName: '모아 평택고덕', role: '마스터' });
      const [activeTab, setActiveTab]       = useState('statements');
      const [isAdmin, setIsAdmin]           = useState(false);
      const [isPwdModalOpen, setIsPwdModalOpen] = useState(false);
      const [pwdInput, setPwdInput]         = useState('');
      const [contracts, setContracts]       = useState({});

      return (
        <div className="max-w-3xl mx-auto p-4 sm:p-6 pb-20">
          <header className="flex justify-between items-center mb-6 bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
            <div className="flex items-center gap-3">
              <div className="w-11 h-11 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-inner">H</div>
              <div>
                <h1 className="text-lg font-extrabold text-gray-900 tracking-tight leading-tight">현장 소통 허브</h1>
                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Field Hub v2.2</p>
              </div>
            </div>
            <div className="text-right">
              <p className="text-sm font-bold text-gray-800">{user.siteName}</p>
              <p className="text-[11px] text-blue-600 font-bold bg-blue-50 inline-block px-2 py-0.5 rounded mt-1">{user.name} {user.role}</p>
            </div>
          </header>

          <div className="flex space-x-2 bg-gray-200/70 p-1.5 rounded-xl mb-6 w-full max-w-sm mx-auto sm:mx-0">
            <button onClick={() => setActiveTab('statements')}
              className={`flex-1 py-2 text-[13px] font-bold rounded-lg transition-all flex justify-center items-center gap-1.5 ${activeTab === 'statements' ? 'bg-white text-blue-600 shadow' : 'text-gray-500 hover:text-gray-800'}`}>
              <span className="material-symbols-outlined" style={{fontSize:'18px'}}>receipt_long</span> 기성내역서
            </button>
            <button onClick={() => setActiveTab('security')}
              className={`flex-1 py-2 text-[13px] font-bold rounded-lg transition-all flex justify-center items-center gap-1.5 ${activeTab === 'security' ? 'bg-white text-blue-600 shadow' : 'text-gray-500 hover:text-gray-800'}`}>
              <span className="material-symbols-outlined" style={{fontSize:'18px'}}>lock</span> 보안설정
            </button>
          </div>

          <main>
            {activeTab === 'statements' ? (
              <StatementsTab
                currentUser={user}
                contracts={contracts}
                setContracts={setContracts}
                isAdmin={isAdmin}
                setIsAdmin={setIsAdmin}
                setIsPwdModalOpen={setIsPwdModalOpen}
              />
            ) : (
              <SecurityTab
                contracts={contracts}
                setContracts={setContracts}
                isAdmin={isAdmin}
                setIsPwdModalOpen={setIsPwdModalOpen}
              />
            )}
          </main>

          {/* 관리자 인증 모달 */}
          {isPwdModalOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-2xl p-6 max-w-xs w-full shadow-2xl border border-gray-100">
                <div className="flex items-center gap-2 mb-4">
                  <span className="material-symbols-outlined text-blue-600">admin_panel_settings</span>
                  <h3 className="font-bold text-gray-800">관리자 인증</h3>
                </div>
                <input type="password" value={pwdInput}
                  onChange={(e) => setPwdInput(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') {
                      if (pwdInput === 'admin123') { setIsAdmin(true); setIsPwdModalOpen(false); setPwdInput(''); }
                      else alert('비밀번호가 틀렸습니다.');
                    }
                  }}
                  placeholder="비밀번호를 입력하세요"
                  className="w-full border border-gray-300 p-2.5 rounded-lg mb-5 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                  autoFocus />
                <div className="flex gap-2">
                  <button onClick={() => { setIsPwdModalOpen(false); setPwdInput(''); }}
                    className="flex-1 py-2.5 bg-gray-100 text-gray-700 font-bold rounded-lg text-sm hover:bg-gray-200 transition-colors">
                    취소
                  </button>
                  <button onClick={() => {
                    if (pwdInput === 'admin123') { setIsAdmin(true); setIsPwdModalOpen(false); setPwdInput(''); }
                    else alert('비밀번호가 틀렸습니다.');
                  }} className="flex-1 py-2.5 bg-blue-600 text-white font-bold rounded-lg text-sm shadow-md hover:bg-blue-700 transition-colors">
                    인증 확인
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
